# detekt-configuratie voor moza-poc-fbs-berichtenbox.
#
# Scope: correctness- en robustness-rulesets die CodeQL (security/dataflow) en
# JaCoCo (coverage) NIET dekken — complexity, potential-bugs, exceptions en
# empty-blocks. Stijl-/naming-/comment-regels staan bewust uit (lage waarde,
# veel ruis; code review en `.editorconfig` dekken stijl). Enige overlap met
# CodeQL is acceptabel: bij AI-ondersteunde ontwikkeling zijn extra guardrails
# gewenst.
#
# We bouwen NIET voort op de detekt-default-config (`buildUponDefaultConfig=false`
# in de POM); alleen de hieronder expliciet geactiveerde regels draaien.
#
# Gate: `maxIssues: 0` in combinatie met een per-module `detekt-baseline.xml`
# (zie POM). Bestaande bevindingen staan in de baseline en falen de build niet;
# ELKE nieuwe bevinding faalt wel. De baseline is de zichtbare debt-lijst en wordt
# stapsgewijs naar 0 teruggebracht (vooral de complexity-methodes opsplitsen).
# Test-sources zijn uitgesloten (zie POM `excludes`).
build:
  maxIssues: 0
  excludeCorrectable: false

config:
  validation: true
  warningsAsErrors: false

complexity:
  active: true
  CognitiveComplexMethod:
    active: true
    threshold: 15
  CyclomaticComplexMethod:
    active: true
    threshold: 15
    ignoreSingleWhenExpression: true
  LongMethod:
    active: true
    threshold: 60
  LongParameterList:
    active: true
    functionThreshold: 8
    constructorThreshold: 8
    ignoreDefaultParameters: true
  NestedBlockDepth:
    active: true
    threshold: 4
  TooManyFunctions:
    active: true
    thresholdInFiles: 20
    thresholdInClasses: 20
    thresholdInInterfaces: 20
    thresholdInObjects: 20
    thresholdInEnums: 20
    ignoreDeprecated: true
    ignorePrivate: true

# Bug-patronen die de Kotlin-compiler en CodeQL (zwakker voor Kotlin) laten lopen.
potential-bugs:
  active: true
  CastToNullableType:
    active: true
  Deprecation:
    active: true
  DontDowncastCollectionTypes:
    active: true
  DoubleMutabilityForCollection:
    active: true
  ElseCaseInsteadOfExhaustiveWhen:
    active: true
  EqualsAlwaysReturnsTrueOrFalse:
    active: true
  ExplicitGarbageCollectionCall:
    active: true
  HasPlatformType:
    active: true
  IgnoredReturnValue:
    active: true
  ImplicitDefaultLocale:
    active: true
  InvalidRange:
    active: true
  IteratorHasNextCallsNextMethod:
    active: true
  MissingWhenCase:
    active: true
  NullableToStringCall:
    active: true
  UnconditionalJumpStatementInLoop:
    active: true
  UnreachableCatchBlock:
    active: true
  UnreachableCode:
    active: true
  UnsafeCallOnNullableType:
    active: true
  UnsafeCast:
    active: true
  WrongEqualsTypeParameter:
    active: true

# Foutafhandeling — sluit aan op de project-lijn "geen stilgeslikte fouten"
# (silent-failure-discipline, ExceptionMappers in fbs-common).
exceptions:
  active: true
  ExceptionRaisedInUnexpectedLocation:
    active: true
  NotImplementedDeclaration:
    active: true
  PrintStackTrace:
    active: true
  RethrowCaughtException:
    active: true
  ReturnFromFinally:
    active: true
  SwallowedException:
    active: true
  ThrowingExceptionFromFinally:
    active: true
  ThrowingExceptionInMain:
    active: true
  ThrowingExceptionsWithoutMessageOrCause:
    active: true
  ThrowingNewInstanceOfSameException:
    active: true
  TooGenericExceptionCaught:
    active: true
  TooGenericExceptionThrown:
    active: true

empty-blocks:
  active: true
  EmptyCatchBlock:
    active: true
  EmptyClassBlock:
    active: true
  EmptyDefaultConstructor:
    active: true
  EmptyElseBlock:
    active: true
  EmptyFinallyBlock:
    active: true
  EmptyForBlock:
    active: true
  EmptyFunctionBlock:
    active: true
  EmptyIfBlock:
    active: true
  EmptyInitBlock:
    active: true
  EmptyKtFile:
    active: true
  EmptySecondaryConstructor:
    active: true
  EmptyTryBlock:
    active: true
  EmptyWhenBlock:
    active: true
  EmptyWhileBlock:
    active: true
