          <script type="text/javascript">const documents = [{"href":"../","type":"Home","title":"Federatief Berichtenstelsel","text":"Federatief Berichtenstelsel System Landscape Doel-architectuur van het Federatief Berichtenstelsel (FBS) - een stelsel van federatief gekoppelde diensten voor berichtenuitwisseling tussen overheidsorganisaties en burgers. ![](embed:SystemLandscape)"},{"href":"../deployment-units-logisch-vs.-fysiek/","type":"Workspace Documentation","title":"Deployment-units: logisch vs. fysiek","text":"Deployment-units: logisch vs. fysiek Fysieke deploybare eenheden Waarom logisch ≠ fysiek Dit model beschrijft de **doel-architectuur**. De C4-containers zijn een *logische*\ndecompositie: ze drukken verantwoordelijkheden en koppelvlakken uit, niet de fysieke\ndeploybare eenheden. In de huidige implementatie (PoC) zijn meerdere logische containers\nsamengevoegd tot één deploybaar proces. De implementatie kent **twee** deploybare Quarkus-services plus **drie** in-process\ngedeelde libraries die binnen die services meedraaien (geen eigen proces, geen netwerk-hop): | Deploybare eenheid | Type | Bevat (logische containers / modules) |\n|---|---|---|\n| `services/berichtenmagazijn` | Quarkus-service | Berichtenmagazijn Aanlever API, Ophaal- en Beheer API, Bericht Validatie Service, Autorisatie Service, Publicatie Stream, Retentie Service, Dataopslag (PostgreSQL via Dev Services/compose) |\n| `services/berichtenuitvraag` | Quarkus-service | Berichten Uitvraag Service, Aanmeld Service, en — in-process — Berichtensessiecache en Magazijnregister |\n| `libraries/fbs-berichtensessiecache` | in-process library | Berichtensessiecache-container (Sessiecache-facade); draait binnen berichtenuitvraag |\n| `libraries/fbs-magazijnregister` | in-process library | Magazijnregister-container; draait binnen berichtenuitvraag |\n| `libraries/fbs-common` | in-process library | Gedeelde JAX-RS filters, exception mappers, identificatienummers, Profiel-client | De logische container-grenzen blijven in het model staan omdat ze de **doel**-decompositie\nbeschrijven (en de koppelvlakken waarlangs later opgesplitst kan worden). De fysieke\ngroepering hierboven beschrijft wat vandaag daadwerkelijk als één proces deployt."},{"href":"../poc-afwijkingen-t.o.v.-de-doel-architectuur/","type":"Workspace Documentation","title":"PoC-afwijkingen t.o.v. de doel-architectuur","text":"PoC-afwijkingen t.o.v. de doel-architectuur Nog niet gerealiseerd: authenticatie, autorisatie en vertrouwen over de keten Het model beschrijft de doel-architectuur van het Federatief Berichtenstelsel. De\nProof of Concept werkt toe naar dat **volledige** doel — geen bewust afgebakende\ndeelverzameling. Eén samenhangend deel is nog niet gerealiseerd: authenticatie en\nautorisatie over de hele keten. Daarvoor is nog geen oplossingsrichting, dus dat\nstellen we uit en werken we door aan wat we wél in de hand hebben. Deze pagina houdt\nbij wat daardoor nu nog niet gebouwd is, zodat het model leesbaar blijft als doelbeeld\nzonder te suggereren dat alles al gebouwd is. Deze onderdelen zijn gemodelleerd als doelbeeld, maar wachten op een\noplossingsrichting voor keten-brede authenticatie en autorisatie binnen MOZa."},{"href":"../organisatie-a/","type":"Software System Info","title":"Organisatie A | Info","text":"orga"},{"href":"../organisatie-a/context/","type":"Context views","title":"Organisatie A | Context views","text":"Organisatie A Deelnemende overheidsorganisatie - host zelf een berichtenmagazijn"},{"href":"../organisatie-a/dependencies/","type":"Dependencies","title":"Organisatie A | Dependencies","text":"Berichtenmagazijn (eigen gehost) Levert berichten aan Digikoppeling REST API via FSC"},{"href":"../organisatie-b/","type":"Software System Info","title":"Organisatie B | Info","text":"orgb"},{"href":"../organisatie-b/context/","type":"Context views","title":"Organisatie B | Context views","text":"Organisatie B Deelnemende overheidsorganisatie - neemt een berichtenmagazijn af bij BBO"},{"href":"../organisatie-b/dependencies/","type":"Dependencies","title":"Organisatie B | Dependencies","text":"Berichtenmagazijn (BBO-gehost) Levert berichten aan Digikoppeling REST API via FSC Berichtenmagazijn Aanlever API Levert berichten aan Digikoppeling REST API via FSC"},{"href":"../berichtenmagazijn-(bbo-gehost)/","type":"Software System Info","title":"Berichtenmagazijn (BBO-gehost) | Info","text":"bbomagazijn FSC-infrastructuur (Inway, Outway, Manager, Directory) is niet als aparte containers gemodelleerd. Het magazijn biedt een Inway aan voor inkomende verzoeken van het Berichten Uitvraag Systeem en deelnemende organisaties. Elke relatie gemarkeerd als 'Digikoppeling REST API via FSC' impliceert: mTLS met PKIoverheid-certificaten, cryptografisch ondertekende FSC-contracten (ServiceConnectionGrant), certificate-bound JWT access tokens (Fsc-Authorization header), en tokenvalidatie door de Inway conform FSC Core v1.1.2. Autorisatie in het magazijn volgt het PEP/PDP-patroon conform AuthZEN NL GOV. De Ophaal- en Beheer API en Aanlever API fungeren als Policy Enforcement Point (PEP): ze onderscheppen verzoeken en handhaven de autorisatiebeslissing. Het Policy Decision Point (PDP) evalueert het autorisatieverzoek (subject/action/resource/context) tegen het beleid — dit kan een interne component zijn of een gedeeld PDP over magazijnen. Autorisatiebeleid wordt beheerd via een Policy Administration Point (PAP). Aanvullende context (bijv. organisatieregistratie, machtigingen) wordt opgehaald via een Policy Information Point (PIP). Autorisatiebeslissingen worden gelogd conform de Authorization Decision Log standaard (Logius)."},{"href":"../berichtenmagazijn-(bbo-gehost)/context/","type":"Context views","title":"Berichtenmagazijn (BBO-gehost) | Context views","text":"Berichtenmagazijn (BBO-gehost) Berichten opslaan, ophalen en beheren (incl. berichtstatus). BBO-gehoste referentie-implementatie die deelnemende organisaties kunnen afnemen in plaats van zelf te hosten."},{"href":"../berichtenmagazijn-(bbo-gehost)/container/","type":"Container views","title":"Berichtenmagazijn (BBO-gehost) | Container views","text":"Autorisatie Service Toetst ophaal- en beheerverzoeken aan het autorisatiebeleid van de deelnemende organisatie. In-process CDI binnen het berichtenmagazijn, geen losse REST-service. Quarkus / Kotlin (in-process CDI) Bericht Validatie Service Valideert berichten op technische eisen en controleert toestemming via Profiel Service. In-process CDI binnen het berichtenmagazijn, geen losse REST-service. Quarkus / Kotlin (in-process CDI) Berichtenmagazijn Aanlever API REST API voor het aanleveren van berichten door organisaties Quarkus / Kotlin Berichtenmagazijn Ophaal- en Beheer API REST API voor het ophalen van berichten en bijlagen, en het beheren van berichtstatus per gebruiker Quarkus / Kotlin Dataopslag Berichtstatus, inhoud en bijlagen (0 berichtverlies) PostgreSQL 18 + Hibernate ORM Panache (Flyway-migraties) Publicatie Stream Wacht met aanmelden van een bericht tot de publicatiedatum is verstreken (outbox-patroon voor gegarandeerde bezorging) Quarkus / Kotlin Retentie Service Geplande hard-delete-job: ruimt soft-deleted berichten op na de retentietermijn en logt de verwijdering naar het LDV-logboek. Cross-pod-veilig via SELECT ... FOR UPDATE SKIP LOCKED. Quarkus / Kotlin (Scheduler)"},{"href":"../berichtenmagazijn-(bbo-gehost)/component/","type":"Component views","title":"Berichtenmagazijn (BBO-gehost) | Component views","text":"Technische Validatie Valideert PDF-type, grootte en aantal bijlagen CDI Bean Toestemming Controle Controleert of de ontvanger toestemming gegeven heeft voor digitale communicatie CDI Bean Validatie-ingang Interne ingang (CDI) voor berichtvalidatie binnen het aanleverproces CDI Bean Aanlever REST API REST endpoints voor het aanleveren van berichten en bijlagen JAX-RS Resource Bericht Opslag Service Berichtlevenscyclus: valideren, opslaan en aanmelden CDI Bean CircuitBreaker Weigert schrijfoperaties wanneer RPO=0 niet gegarandeerd kan worden (dataopslag onbeschikbaar) MicroProfile Fault Tolerance"},{"href":"../berichtenmagazijn-(bbo-gehost)/dependencies/","type":"Dependencies","title":"Berichtenmagazijn (BBO-gehost) | Dependencies","text":"Aanmeld Service Meldt nieuw bericht aan Digikoppeling REST API via FSC Berichten Uitvraag Systeem Meldt nieuw bericht aan Digikoppeling REST API via FSC Notificatie Service Stuurt bericht-events door CloudEvents webhook via FSC Profiel Service Controleert of de ontvanger toestemming gegeven heeft Digikoppeling REST API via FSC Berichten Uitvraag Systeem Haalt berichtenlijst, incl. berichtinhoud en attributen, of bijlagen op Digikoppeling REST API via FSC Organisatie B Levert berichten aan Digikoppeling REST API via FSC"},{"href":"../berichten-uitvraag-systeem/","type":"Software System Info","title":"Berichten Uitvraag Systeem | Info","text":"berichtenuitvraagsysteem FSC-infrastructuur (Inway, Outway, Manager, Directory) is niet als aparte containers gemodelleerd. Elke organisatiegrens-overschrijdende relatie gemarkeerd als 'Digikoppeling REST API via FSC' impliceert: mTLS met PKIoverheid-certificaten, cryptografisch ondertekende FSC-contracten (ServiceConnectionGrant), certificate-bound JWT access tokens (Fsc-Authorization header), en een Inway/Outway-paar per deelnemend systeem. De FSC Manager fungeert als OAuth 2.0 Authorization Server (client_credentials grant) voor service-to-service tokens conform FSC Core v1.1.2. Autorisatie in het Uitvraag Systeem volgt het PEP/PDP-patroon conform AuthZEN NL GOV op twee niveaus: (1) Token Validatie fungeert als PEP en extraheert de gebruikersidentiteit en machtigingsclaims uit het JWT — voor burgers het PP (DigiD), voor zakelijke gebruikers KvK/RSIN, dienstcodes en machtigingstype (eHerkenning ketenmachtiging). (2) MagazijnResolver fungeert als PEP/PDP voor magazijntoegang: evalueert per magazijn of de combinatie van machtigingsclaims en dienstcodes toegang rechtvaardigt. Bij eHerkenning ketenmachtiging wordt de volledige machtigingsketen (persoon → gemachtigde organisatie → vertegenwoordigde organisatie) meegewogen. Autorisatiebeslissingen worden gelogd conform de Authorization Decision Log standaard (Logius)."},{"href":"../berichten-uitvraag-systeem/context/","type":"Context views","title":"Berichten Uitvraag Systeem | Context views","text":"Berichten Uitvraag Systeem Centraal systeem voor het uitvragen, beheren en aanleveren van berichten in het Federatief Berichtenstelsel"},{"href":"../berichten-uitvraag-systeem/container/","type":"Container views","title":"Berichten Uitvraag Systeem | Container views","text":"Aanmeld Service Werkt de cache bij voor nieuwe berichten verzonden tijdens de sessie van de ontvanger Quarkus / Kotlin BSNk Transformatie Transformeert PP naar EP per berichtenmagazijn — vereist sleutelmateriaal per deelnemer BSNk container (Logius) Berichten Uitvraag Service Service voor burgers en ondernemers - berichtenbox inzien en berichten beheren Quarkus / Kotlin Berichtensessiecache Afgeschermde in-process module: aggregeert berichten uit alle aangesloten magazijnen en cachet ze per pseudoniem. Geen losse service meer — enige ingang is de Sessiecache-facade; de interne werking (Redis-cache, magazijn-aggregatie) is niet zichtbaar voor consumenten. Quarkus / Kotlin — gedeelde library (in-process) Magazijnregister Houdt per deelnemende organisatie (OIN) bij welk berichtenmagazijn erbij hoort — 1:1, het magazijnId ís de OIN. Nu config-backed; later database-opslag met beheer-interface. Quarkus / Kotlin — gedeelde library (in-process)"},{"href":"../berichten-uitvraag-systeem/component/","type":"Component views","title":"Berichten Uitvraag Systeem | Component views","text":"Aanmeld Deduplicatie Ontdubbelt inkomende aanmeldingen idempotent (Redis SET NX EX, atomaire write met TTL), zodat herhaalde levering van hetzelfde gepubliceerde bericht de cache niet dubbel bijwerkt CDI Bean / Redis Aanmeld Verwerking Verwerkt inkomende aanmeldingen en werkt de sessiecache bij (aanmeld-write, in-sessie) CDI Bean Bericht Beheer Service Verplaatst berichten naar andere map, verwijdert berichten en beheert berichtstatus (gelezen, etc.) CDI Bean Bericht Ophaal Service Haalt berichten en bijlagen op uit cache en berichtenmagazijn CDI Bean Berichten Uitvraag API REST endpoints voor berichtenlijst, ophalen, beheer en verwijderen JAX-RS Resource Berichtenlijst Service Levert per map een berichtenlijst CDI Bean Token Validatie Valideert JWT bearer tokens (handtekening, iss, aud, exp, jti, acr) en stelt de gebruikersidentiteit en het betrouwbaarheidsniveau vast CDI Bean BerichtensessiecacheService Aggregeert berichten uit de door MagazijnResolver bepaalde magazijnen en cachet de resultaten per pseudoniem CDI Bean (internal) Cache Afgeschermd implementatiedetail: berichten met full-text zoekindex en sliding-TTL, gedeeld over pods zodat ophalen én aanmelden dezelfde tijdelijke opslag delen Redis / RediSearch (internal) MagazijnAggregatieBulkhead Semafoor-bulkhead die het aantal gelijktijdige blokkerende magazijn-aggregatie-calls begrenst, zodat één trage leverancier de gedeelde worker-pool niet laat vollopen en overige endpoints responsief blijven CDI Bean (internal) MagazijnCircuitBreaker Per-magazijn circuit breaker: opent na opeenvolgende fouten/timeouts zodat een onbereikbaar magazijn de aggregatie niet blijft ophouden CDI Bean (internal) MagazijnClient REST client naar berichtenmagazijnen (per magazijn opgebouwd via MagazijnClientFactory) REST Client (internal) MagazijnResolver Bepaalt op basis van dienstvoorkeuren (Profiel Service) en machtigingen welke magazijnen bevraagd worden CDI Bean (internal) PseudoniemService Transformeert PP naar EP per magazijn via BSNk CDI Bean (internal) Sessiecache-facade De enige publieke ingang: lijst, zoeken, bericht, status bijwerken, verwijderen, ophalen-stream en aanmeld-write. De implementatie erachter is Kotlin `internal` — compile-afgedwongen onzichtbaar voor consumenten. CDI Facade"},{"href":"../berichten-uitvraag-systeem/dependencies/","type":"Dependencies","title":"Berichten Uitvraag Systeem | Dependencies","text":"Berichtenmagazijn (BBO-gehost) Haalt berichtenlijst, incl. berichtinhoud en attributen, of bijlagen op Digikoppeling REST API via FSC Berichtenmagazijn (eigen gehost) Haalt berichtenlijst, incl. berichtinhoud en attributen, of bijlagen op Digikoppeling REST API via FSC Berichtenmagazijn Ophaal- en Beheer API Haalt berichtenlijst, incl. berichtinhoud en attributen, of bijlagen op Digikoppeling REST API via FSC Profiel Service Haalt dienstvoorkeuren op om te bepalen welke magazijnen bevraagd worden Digikoppeling REST API via FSC Berichtenmagazijn (BBO-gehost) Meldt nieuw bericht aan Digikoppeling REST API via FSC Berichtenmagazijn (eigen gehost) Meldt nieuw bericht aan Digikoppeling REST API via FSC Interactielaag Berichtenbox API-aanroepen namens burger of ondernemer Digikoppeling REST API via FSC (JWT bearer token)"}];const idx = lunr(function () {
