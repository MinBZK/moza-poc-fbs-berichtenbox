# Test configuratie
quarkus.http.test-port=0

# Test-config: dezelfde Postgres als dev (via Quarkus Dev Services + Testcontainers),
# zodat de migratiescripts en Hibernate-mapping in CI tegen dezelfde DBMS-versie
# gevalideerd worden als waartegen de service in productie draait. Geen handmatige
# `jdbc.url`: Dev Services start een verse Postgres-container per testrun.
quarkus.datasource.db-kind=postgresql
quarkus.datasource.devservices.image-name=postgres:18

# Ook in tests draait Flyway het schema (i.p.v. Hibernate drop-and-create), zodat
# de migratiescripts onder db/migration/ per run worden gevalideerd.
quarkus.hibernate-orm.database.generation=validate
quarkus.flyway.migrate-at-start=true

# Logboek Dataverwerkingen uitgeschakeld in tests
logboekdataverwerking.enabled=false
logboekdataverwerking.service-name=berichtenmagazijn-test

# Publicatie Stream — testdefaults. Polling-interval kort zodat E2E-tests snel
# verzenden; backoff laag zodat retry-tests niet seconden lang wachten.
# Downstreams worden per test op een random WireMock-port gezet (system-property
# in @TestProfile.getConfigOverrides). Geen URLs hier zodat ongebruikte
# downstreams in unit tests niet stiekem netwerk-calls doen.
magazijn.publicatie.organisatie.oin=00000001003214345000
magazijn.publicatie.polling.interval=200ms
magazijn.publicatie.batch-grootte=50
magazijn.publicatie.max-pogingen=3
magazijn.publicatie.backoff.basis=PT0.05S
magazijn.publicatie.backoff.cap=PT1S
# Opschoning niet vaker dan eens per uur in tests — zou anders elke testrun
# een extra DELETE-query firen.
magazijn.publicatie.opschonen.interval=1h
# Default-downstream voor algemene aanlever-tests (zonder publicatie-flow). Wijst
# naar een gesloten poort op loopback — outbox-rijen worden gepland maar nooit
# afgeleverd omdat de scheduler standaard uit staat (zie hieronder).
#
# **Bewuste trade-off**: `PublicatieOutbox.planDeliveries` faalt fail-closed
# zonder downstreams om phantom-published berichten te voorkomen. Een globale
# default voorkomt dat élke `@QuarkusTest` die `opslaanBericht` aanroept een
# eigen `@TestProfile` moet meebrengen. Kosten: ~2 outbox-rijen per
# aangeleverd bericht in de test-DB. Geen netwerk-I/O (scheduler off) en geen
# retries; rijen worden door per-test cleanup of een verse container weggegooid.
#
# E2E-tests overschrijven via `@TestProfile.getConfigOverrides`; SmallRye
# vervangt de key dan (niet `MERGE`).
magazijn.publicatie.downstreams.default.url=http://localhost:1/events
# Default off zodat de scheduler niet polt in unit-tests die alleen DB raken.
# E2E-tests die de scheduler nodig hebben overriden dit.
quarkus.scheduler.enabled=false

# Uitgesloten: gegenereerde code en value-class-wrappers — die vertekenen
# het coveragepercentage zonder testkwaliteit te meten.
quarkus.jacoco.excludes=nl/rijksoverheid/moz/berichtenmagazijn/api/**,nl/rijksoverheid/moz/fbs/common/**

