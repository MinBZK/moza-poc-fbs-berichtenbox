# Test-config: dezelfde Postgres als dev (via Quarkus Dev Services + Testcontainers),
# zodat de migratiescripts en Hibernate-mapping in CI tegen dezelfde DBMS-versie
# gevalideerd worden als waartegen de service in productie draait. Geen handmatige
# `jdbc.url`: Dev Services start een verse Postgres-container per testrun.
quarkus.datasource.db-kind=postgresql
quarkus.datasource.devservices.image-name=postgres:18

# Ook in tests draait Flyway het schema (i.p.v. Hibernate drop-and-create), zodat
# de migratiescripts onder db/migration/ per run worden gevalideerd.
quarkus.hibernate-orm.database.generation=validate
quarkus.flyway.migrate-at-start=true

# Logboek Dataverwerkingen uitgeschakeld in tests
logboekdataverwerking.enabled=false
logboekdataverwerking.service-name=berichtenmagazijn-test

# Uitgesloten: gegenereerde code en value-class-wrappers — die vertekenen
# het coveragepercentage zonder testkwaliteit te meten.
quarkus.jacoco.excludes=nl/rijksoverheid/moz/berichtenmagazijn/api/**,nl/rijksoverheid/moz/fbs/common/**

