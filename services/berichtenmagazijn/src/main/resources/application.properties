quarkus.application.name=berichtenmagazijn
quarkus.application.version=0.1.0

# Container-image (jib): stabiele image-naam zodat de deploy-keten een vaste
# coördinaat heeft. Registry, group, tag, build/push en credentials komen uit de
# CI-flags (-Dquarkus.container-image.*), niet uit deze property.
quarkus.container-image.name=fbs-berichtenmagazijn

quarkus.http.port=8090

# OpenAPI / Swagger UI (ADR: spec MOET op /openapi.json beschikbaar zijn)
quarkus.smallrye-openapi.path=/openapi.json
quarkus.swagger-ui.always-include=true

# Security headers op ÁLLE HTTP-responses (ook /openapi.json, /q/health,
# /q/metrics, dev-UI) — niet alleen op JAX-RS-paden. De SecurityHeadersFilter
# in fbs-common dekt JAX-RS responses; deze Quarkus-config dekt de rest.
quarkus.http.header."X-Frame-Options".value=DENY
quarkus.http.header."X-Content-Type-Options".value=nosniff
quarkus.http.header."Strict-Transport-Security".value=max-age=31536000; includeSubDomains; preload
quarkus.http.header."Content-Security-Policy".value=frame-ancestors 'none'
quarkus.http.header."Referrer-Policy".value=no-referrer
# API-responses bevatten gevoelige gegevens (BSN/RSIN, berichtinhoud) — caching
# door browsers, proxies of CDN's is ongewenst. ADR Transport Security beveelt
# `no-store` aan voor API-endpoints.
quarkus.http.header."Cache-Control".value=no-store

# Max request body: ruim boven Bericht.MAX_INHOUD_BYTES (1 MiB) + één
# bijlage van Bijlage.MAX_CONTENT_BYTES (25 MiB) + base64-overhead (~33%)
# + JSON-envelope. 40M dekt een aanlever-request met inhoud en bijlage(n);
# grotere requests worden door Quarkus afgewezen.
quarkus.http.limits.max-body-size=40M

# CORS — backend-only API; geen browser-clients. Expliciet uit zodat een
# toekomstige misconfig niet stilletjes cross-origin requests toelaat. NeRDS
# `/core/transport/cors` vereist een expliciete policy (mag dus ook "uit").
quarkus.http.cors.enabled=false

# OpenAPI runtime endpoint — vereist voor NeRDS `/core/publish-openapi` en voor
# discovery via developer.overheid.nl. Stand-alone YAML/JSON i.p.v. Swagger UI.
quarkus.smallrye-openapi.path=/openapi
# Bron-spec wordt door OpenAPI-generator als interface gegenereerd; SmallRye
# regenereert hem hier vanuit de gegenereerde JAX-RS-resources zodat runtime-
# gemigreerde paths exact getoond worden.
quarkus.smallrye-openapi.always-run-filter=true

# Persistentie — PostgreSQL voor alle profielen, zodat dev/test/prod hetzelfde
# DBMS-gedrag laten zien. Dev gebruikt de Postgres-service uit `compose.yaml`
# (persistent volume zodat data restarts overleeft); tests gebruiken Quarkus
# Dev Services dat een verse Testcontainers-Postgres per run start. %prod
# heeft geen defaults; die moeten expliciet geconfigureerd worden zodra de
# service in productie komt.
quarkus.datasource.db-kind=postgresql
quarkus.datasource.devservices.image-name=postgres:18
%dev.quarkus.datasource.jdbc.url=jdbc:postgresql://localhost:5432/berichtenmagazijn
%dev.quarkus.datasource.username=berichtenmagazijn
%dev.quarkus.datasource.password=berichtenmagazijn
# %prod: geen default — de deploy MOET een (centraal beheerde) Postgres aanwijzen,
# anders faalt de service te starten i.p.v. stilletjes localhost te proberen. Elk
# deployable magazijn krijgt een eigen database/schema via deze env-vars.
%prod.quarkus.datasource.jdbc.url=${DB_JDBC_URL}
%prod.quarkus.datasource.username=${DB_USERNAME}
%prod.quarkus.datasource.password=${DB_PASSWORD}
# Schema-isolatie per magazijn binnen één gedeelde DB: ZAD levert 1 database + 1 user,
# maar meerdere magazijnen mogen niet dezelfde tabellen delen (anders mengt berichten-
# data + Flyway-conflicten). Elk magazijn migreert + leest zijn eigen schema (eigen
# flyway_schema_history). Geen %prod-default → fail-fast i.p.v. stil `public` delen.
# Flyway maakt het schema aan (create-schemas default true) mits de user CREATE mag;
# anders het schema vooraf laten aanmaken en quarkus.flyway.create-schemas=false zetten.
%prod.quarkus.flyway.schemas=${DB_SCHEMA}
%prod.quarkus.hibernate-orm.database.default-schema=${DB_SCHEMA}

# Schema-beheer: Flyway beheert de DDL via versioned migraties onder
# src/main/resources/db/migration/. Hibernate valideert alleen dat de ORM-mapping
# overeenkomt met het schema — genereert nooit DDL en dropt nooit tabellen.
quarkus.hibernate-orm.database.generation=validate
quarkus.flyway.migrate-at-start=true

quarkus.hibernate-orm.log.sql=false

# Jackson: null-velden niet serialiseren zodat optionele velden (bv. HAL `_links.next`
# op de laatste pagina) afwezig zijn i.p.v. `null` — dat matcht de OpenAPI-spec waar
# zulke velden niet als `nullable` zijn gedeclareerd.
quarkus.jackson.serialization-inclusion=non_null

# Circuit breaker (defaults overschreven in annotatie)
quarkus.fault-tolerance.enabled=true

# Logboek Dataverwerkingen (AVG Art. 30) — geen fallback-defaults voor credentials
# en endpoint, zodat de service faalt te starten als env-vars ontbreken; anders draait
# LDV stilletjes op bekende defaults of (erger) een onversleuteld endpoint.
logboekdataverwerking.enabled=true
# BEWUST ONVEILIG (default false = veilig). true zet de https-eis op de LDV/ClickHouse-
# endpoint UIT → de BSN (LDV-dataSubjectId) gaat dan plaintext over het netwerk. Alleen
# aanzetten in ZAD (env FBS_LDV_UNSAFE_ALLOW_PLAINTEXT_ENDPOINT=true) waar ClickHouse
# intern blijft én mesh-mTLS het transport beveiligt, of zonder echte persoonsgegevens.
fbs.ldv.unsafe-allow-plaintext-endpoint=false
logboekdataverwerking.service-name=berichtenmagazijn
logboekdataverwerking.clickhouse.endpoint=${LDV_CLICKHOUSE_ENDPOINT}
logboekdataverwerking.clickhouse.username=${CLICKHOUSE_USERNAME}
logboekdataverwerking.clickhouse.password=${CLICKHOUSE_PASSWORD}
logboekdataverwerking.clickhouse.database=ldv_logging
logboekdataverwerking.clickhouse.table=logboek_dataverwerkingen

# Voor dev/test: veilige defaults zodat lokaal draaien zonder env-vars werkt.
# In %prod blijft de basisproperty `${LDV_CLICKHOUSE_ENDPOINT}` zonder default; operators
# MOETEN een TLS-endpoint (https://) zetten conform BIO 13.2.1 (persoonsgegevens
# versleuteld over netwerk).
%dev.logboekdataverwerking.clickhouse.endpoint=http://localhost:8123
%dev.logboekdataverwerking.clickhouse.username=ldv
%dev.logboekdataverwerking.clickhouse.password=ldv
%test.logboekdataverwerking.clickhouse.endpoint=http://localhost:8123
%test.logboekdataverwerking.clickhouse.username=ldv
%test.logboekdataverwerking.clickhouse.password=ldv

# Quarkus bean discovery voor logboekdataverwerking-wrapper
quarkus.index-dependency.ldv.group-id=nl.mijnoverheidzakelijk.ldv
quarkus.index-dependency.ldv.artifact-id=logboekdataverwerking-wrapper

# Publicatie Stream (Issue 412) — outbox-poller en CloudEvents downstreams.
#
# `organisatie.oin` is de OIN van het magazijn zelf en gaat als CloudEvent `source`
# (URN-notatie) mee. Eén image, meerdere deployable magazijnen: elk deployment zet
# zijn eigen OIN via env-var; de dev-default dekt lokaal draaien.
magazijn.publicatie.organisatie.oin=${MAGAZIJN_OIN:00000001003214345000}
magazijn.publicatie.polling.interval=60s
magazijn.publicatie.polling.max-opeenvolgende-fouten=3
magazijn.publicatie.batch-grootte=50
# maxPogingen + backoff zijn per-downstream (magazijn.publicatie.downstreams.<key>.*);
# zonder override gelden de @WithDefault-waarden: max-pogingen=5, backoff PT1S..PT1H.
# Opschoning van GEPUBLICEERD-rijen >30 dagen. Tuning-rationale staat op
# één plek: KDoc op PublicatieConfig.Opschonen.interval.
magazijn.publicatie.opschonen.interval=24h
# AVG art. 30-verwerkingsregister-URI's voor LDV (zie operator-handleiding,
# sectie "Verplichte productie-overrides"). Default-waarden bevatten
# `example.com` zodat lokaal/dev-draaien direct signaleert dat productie
# een echte register-URI moet zetten.
magazijn.publicatie.verwerkingsregister-publiceren=https://register.example.com/verwerkingen/berichtenmagazijn-publiceren
magazijn.publicatie.verwerkingsregister-aanleveren=https://register.example.com/verwerkingen/berichtenmagazijn-aanleveren
# Downstreams: nieuwe entries toevoegen = config-only (geen schema-/code-wijziging).
# In dev draaien Aanmeld en Notificatie als WireMock-stubs uit compose.yaml.
%dev.magazijn.publicatie.downstreams.aanmeld.url=http://localhost:8083/events
%dev.magazijn.publicatie.downstreams.notificatie.url=http://localhost:8084/events
# In %prod komen de downstream-URL's uit env-vars; de keys staan hier omdat SmallRye
# map-keys niet uit losse env-vars ontdekt. aanmeld = de echte uitvraag-webhook
# (POST /api/v1/aanmeldingen), notificatie = WireMock-stub. De ZAD-deploymentnaam
# zit al in de env-waarde verwerkt (URL-templating op $DEPLOYMENT_NAME in OM).
%prod.magazijn.publicatie.downstreams.aanmeld.url=${AANMELD_URL}
%prod.magazijn.publicatie.downstreams.notificatie.url=${NOTIFICATIE_URL}
# Timeouts op de gedeelde DownstreamClient-HttpClient. Anders dan de lokale
# Redis-awaits zijn dit remote, cross-organisatie calls over publiek internet naar een
# federatieve dienstverlener: connect (TCP+TLS-opbouw) 5s, request (volledige
# POST-round-trip) 10s. Per omgeving op te hogen bij een trager netwerk of striktere SLO.
magazijn.publicatie.client.connect-timeout=5s
magazijn.publicatie.client.request-timeout=10s
%prod.magazijn.publicatie.client.connect-timeout=${DOWNSTREAM_CONNECT_TIMEOUT:5s}
%prod.magazijn.publicatie.client.request-timeout=${DOWNSTREAM_REQUEST_TIMEOUT:10s}

# Hard-delete-job: retentie van soft-deleted berichten.
# Bewaartermijnen zijn ISO-8601 Period (P7Y, P3M, P90D). Default 7 jaar volgt
# de administratieve standaard; operators MOETEN afstemmen op de geldende
# selectielijst (Archiefwet).
retentie.hard-delete.minimale-leeftijd=P7Y
retentie.hard-delete.minimale-soft-delete-leeftijd=P7Y
retentie.hard-delete.cron=0 0 3 * * ?
retentie.hard-delete.batch-grootte=1000

# MOZA Profiel Service — externe service (zie github.com/MinBZK/moza-profiel-service).
# Onze REST client hangt aan path `/api/profielservice/v1/{type}/{nummer}` voor het
# ophalen van een partij + voorkeuren. Voor lokaal/PoC draait er een WireMock-stub
# op poort 8089 (zie compose.yaml + wiremock/externe-stubs/). Tests vervangen de
# bean via een @Mock CDI-bean. Geen fallback-default voor de basisproperty zodat een
# %prod-deploy zonder env-var faalt te starten (i.p.v. stilletjes localhost te
# proberen). ProfielServiceEndpointValidator dwingt TLS af in non-dev/test.
quarkus.rest-client.profiel-service.url=${PROFIEL_SERVICE_URL}
%dev.quarkus.rest-client.profiel-service.url=http://localhost:8089
%test.quarkus.rest-client.profiel-service.url=http://localhost:8089

# Time-outs op de Profiel-Service-call (waarde in milliseconden): bij gebrek aan
# limieten blokkeert een hangende upstream de aanlever-thread tot de client cancelt.
# 2s connect + 5s read geeft een nettere fail-fast naar het bovenliggende circuit
# breaker. Vaste Quarkus RestClient-sleutels: de naam draagt geen `-ms`-suffix zoals
# onze eigen properties, omdat hernoemen Quarkus de waarde laat negeren en de timeout
# stil zou uitschakelen.
quarkus.rest-client.profiel-service.connect-timeout=2000
quarkus.rest-client.profiel-service.read-timeout=5000
# Connection pool + keep-alive: zonder dit doet elke aanlever-/ophaal-validatie
# een nieuwe TCP+TLS handshake naar Profiel (~50-200ms RTT-overhead onder
# PKIoverheid). Pool-size 20 + connection-ttl 300s identiek aan berichten-
# sessiecache zodat beide services Profiel uniform belasten.
quarkus.rest-client.profiel-service.connection-pool-size=20
quarkus.rest-client.profiel-service.connection-ttl=300
quarkus.rest-client.profiel-service.keep-alive-enabled=true

# @Retry-tuning per omgeving (MP Fault Tolerance config-override).
# Dev/test: jitter=0 voor deterministisch test-gedrag. Prod/staging/acceptatie:
# jitter > 0 spreidt retry-pieken bij upstream-storm (thundering-herd-protection).
# Zie ook berichtensessiecache — beide services gebruiken dezelfde ProfielServiceClient.
nl.rijksoverheid.moz.fbs.common.profiel.ProfielServiceClient/getPartij/Retry/jitter=0
%prod.nl.rijksoverheid.moz.fbs.common.profiel.ProfielServiceClient/getPartij/Retry/jitter=${PROFIEL_RETRY_JITTER:200}
%staging.nl.rijksoverheid.moz.fbs.common.profiel.ProfielServiceClient/getPartij/Retry/jitter=${PROFIEL_RETRY_JITTER:200}
%acceptatie.nl.rijksoverheid.moz.fbs.common.profiel.ProfielServiceClient/getPartij/Retry/jitter=${PROFIEL_RETRY_JITTER:100}
