quarkus.application.name=berichtenmagazijn
quarkus.application.version=0.1.0

# API-majorversie die ApiVersionFilter (fbs-common) in de `API-Version`-header zet.
# Houd deze in sync met `servers[0].url` in berichtenmagazijn-api.yaml; de
# gegenereerde `ApiInfo.API_VERSION`-constante is de bron van waarheid binnen
# Kotlin/Java code.
fbs.api.version=v1

quarkus.http.port=8090

# Max request body: 1 MiB UTF-8 inhoud + marge voor JSON-envelope, JSON-escaping
# en het feit dat de domein-grens in BYTES is (een 4-byte emoji × 256k = 1 MiB
# UTF-8 → in JSON met escaping kan dat ruim 1,3 MiB zijn). 4 MiB geeft genoeg
# kop voor de protocol-laag terwijl de echte grens in Bericht.MAX_INHOUD_BYTES
# bewaakt wordt. Beschermt tegen DoS via gigantische payloads.
quarkus.http.limits.max-body-size=4M

# Persistentie — H2 embedded alleen in dev/test. %prod heeft geen defaults; die
# moeten expliciet geconfigureerd worden (PostgreSQL) zodra de service in productie komt.
quarkus.datasource.db-kind=h2
%dev.quarkus.datasource.jdbc.url=jdbc:h2:mem:berichtenmagazijn;DB_CLOSE_DELAY=-1
%test.quarkus.datasource.jdbc.url=jdbc:h2:mem:berichtenmagazijn;DB_CLOSE_DELAY=-1

# Schema-beheer: Flyway beheert de DDL via versioned migraties onder
# src/main/resources/db/migration/. Hibernate valideert alleen dat de ORM-mapping
# overeenkomt met het schema — genereert nooit DDL en dropt nooit tabellen.
quarkus.hibernate-orm.database.generation=validate
quarkus.flyway.migrate-at-start=true

quarkus.hibernate-orm.log.sql=false

# Circuit breaker (defaults overschreven in annotatie)
quarkus.fault-tolerance.enabled=true

# Logboek Dataverwerkingen (AVG Art. 30) — geen fallback-defaults voor credentials
# zodat de service faalt te starten als env-vars ontbreken; anders draait LDV stilletjes
# op bekende defaults.
logboekdataverwerking.enabled=true
logboekdataverwerking.service-name=berichtenmagazijn
logboekdataverwerking.clickhouse.endpoint=http://localhost:8123
logboekdataverwerking.clickhouse.username=${CLICKHOUSE_USERNAME}
logboekdataverwerking.clickhouse.password=${CLICKHOUSE_PASSWORD}
logboekdataverwerking.clickhouse.database=ldv_logging
logboekdataverwerking.clickhouse.table=logboek_dataverwerkingen

# Voor dev/test: veilige default-credentials zodat lokaal draaien zonder env-vars werkt.
%dev.logboekdataverwerking.clickhouse.username=ldv
%dev.logboekdataverwerking.clickhouse.password=ldv
%test.logboekdataverwerking.clickhouse.username=ldv
%test.logboekdataverwerking.clickhouse.password=ldv

# Quarkus bean discovery voor logboekdataverwerking-wrapper
quarkus.index-dependency.ldv.group-id=nl.mijnoverheidzakelijk.ldv
quarkus.index-dependency.ldv.artifact-id=logboekdataverwerking-wrapper
