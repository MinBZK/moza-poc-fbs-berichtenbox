<!doctype html>
<html lang="nl">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>FBS Demo-console</title>
  <style>
    body { font-family: system-ui, sans-serif; max-width: 40rem; margin: 2rem auto; padding: 0 1rem; }
    button { font-size: 1rem; padding: 0.5rem 1rem; margin: 0.25rem 0; cursor: pointer; }
    input { font-size: 1rem; padding: 0.4rem; width: 5rem; }
    fieldset { margin: 1rem 0; }
    pre { background: #f4f4f4; padding: 1rem; overflow-x: auto; white-space: pre-wrap; }
  </style>
</head>
<body>
  <h1>FBS Demo-console</h1>
  <p><a href="berichtenbox.html">&rarr; Berichtenbox (ondernemer-weergave)</a></p>
  <p>Wegwerp-bediening voor de demo-stack. Leeg vóór je opnieuw vult.</p>

  <fieldset>
    <legend>Beheer</legend>
    <button onclick="post('/api/demo/legen', true)">Magazijnen legen</button>
    <button onclick="get('/api/demo/status')">Status (aantal berichten)</button>
    <button onclick="post('/api/demo/sessie/verlopen')">Cache verlopen (sessies wissen)</button>
  </fieldset>

  <fieldset>
    <legend>Vullen</legend>
    <button onclick="post('/api/demo/basisvulling')">Basisvulling laden</button>
    <br>
    <label>Random berichten: <input id="aantal" type="number" value="10" min="1" max="500"></label>
    <button onclick="post('/api/demo/random?aantal=' + document.getElementById('aantal').value)">Opvoeren</button>
  </fieldset>

  <fieldset>
    <legend>Storingen (fase 3)</legend>
    <button onclick="post('/api/demo/storing/magazijn/a/traag')">Magazijn A (RVO) traag</button>
    <button onclick="post('/api/demo/storing/magazijn/a/uit')">Magazijn A (RVO) uit</button>
    <br>
    <button onclick="post('/api/demo/storing/magazijn/b/traag')">Magazijn B (Belastingdienst) traag</button>
    <button onclick="post('/api/demo/storing/magazijn/b/uit')">Magazijn B (Belastingdienst) uit</button>
    <br>
    <button onclick="post('/api/demo/storing/reset')">Alles normaal (reset)</button>
  </fieldset>

  <fieldset>
    <legend>Technische scenario's (fase 5)</legend>
    <button onclick="post('/api/demo/storing/redis/uit')">Redis uit (scenario 12)</button>
    <button onclick="post('/api/demo/storing/profiel/uit')">Profielservice uit (scenario 9)</button>
    <br>
    <button onclick="post('/api/demo/storing/notificatie/uit')">Notificatie uit (scenario 10)</button>
    <button onclick="post('/api/demo/storing/aanmeld/uit')">Uitvraag/aanmeld uit (scenario 11)</button>
    <p><small>Herstellen: gebruik "Alles normaal (reset)" hierboven.</small></p>
    <br>
    <button onclick="post('/api/demo/foutieve-aanlevering')">Foutieve aanlevering (scenario 8)</button>
  </fieldset>

  <h2>Resultaat</h2>
  <pre id="uit">—</pre>

  <script>
    const uit = document.getElementById('uit');

    async function post(pad, bevestig) {
      if (bevestig && !confirm('Zeker weten? Dit verwijdert alle berichten uit beide magazijnen.')) return;

      toon('Bezig…');
      try {
        const r = await fetch(pad, { method: 'POST' });
        toon(JSON.stringify(await r.json(), null, 2));
      } catch (e) {
        toon('Fout: ' + e);
      }
    }

    async function get(pad) {
      toon('Bezig…');
      try {
        const r = await fetch(pad);
        toon(JSON.stringify(await r.json(), null, 2));
      } catch (e) {
        toon('Fout: ' + e);
      }
    }

    function toon(tekst) { uit.textContent = tekst; }
  </script>
</body>
</html>
