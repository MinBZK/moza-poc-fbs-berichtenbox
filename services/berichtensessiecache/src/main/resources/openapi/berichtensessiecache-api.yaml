openapi: 3.0.3
info:
  title: FBS Berichtensessiecache API
  description: |
    API voor het ophalen van geaggregeerde berichtrecords uit aangesloten
    decentrale magazijnen binnen het Federatief Berichtenstelsel (FBS).
  version: 0.1.0
  contact:
    name: MOZA Team
    email: moza@minbzk.nl
    url: https://github.com/MinBZK/moza-poc-fbs-berichtenbox
  license:
    name: EUPL-1.2
    url: https://eupl.eu/1.2/nl/

servers:
  - url: /api/v1
    description: API v1

paths:
  /berichten:
    get:
      operationId: getBerichten
      summary: Geaggregeerde berichtensessiecache ophalen
      description: |
        Haalt een gepagineerde lijst van berichtrecords op uit de cache.
        Berichten worden eerst opgehaald via het /berichten/_ophalen SSE-endpoint.
      tags:
        - berichten
      parameters:
        - $ref: '#/components/parameters/PageParam'
        - $ref: '#/components/parameters/PageSizeParam'
        - name: ontvanger
          in: query
          required: true
          description: Ontvanger (BSN of KVK-nummer)
          x-todo: "Ontvanger tzt uit security-context halen"
          schema:
            type: string
            minLength: 1
        - name: afzender
          in: query
          description: Filter op afzender (OIN)
          schema:
            type: string
      responses:
        '200':
          description: Lijst van berichten
          headers:
            API-Version:
              $ref: '#/components/headers/API-Version'
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/BerichtensessiecacheResponse'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '409':
          description: |
            Berichten zijn nog niet opgehaald of het ophalen is nog bezig.
            Roep eerst GET /berichten/_ophalen aan.
          content:
            application/problem+json:
              schema:
                $ref: '#/components/schemas/Problem'
        '500':
          $ref: '#/components/responses/InternalServerError'

  /berichten/{berichtId}:
    get:
      operationId: getBerichtById
      summary: Enkel berichtrecord ophalen
      description: |
        Haalt een enkel berichtrecord op aan de hand van het unieke bericht-ID.
        Als het bericht in de cache zit (na een eerdere ophaalactie) wordt het
        direct geretourneerd. Anders worden alle aangesloten magazijnen bevraagd.
        Retourneert 404 als het bericht niet gevonden is, of 502 als geen enkel
        magazijn bereikbaar is en het bericht niet in de cache zit.
      tags:
        - berichten
      parameters:
        - name: berichtId
          in: path
          required: true
          description: Uniek ID van het bericht
          schema:
            type: string
            format: uuid
      responses:
        '200':
          description: Berichtrecord gevonden
          headers:
            API-Version:
              $ref: '#/components/headers/API-Version'
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/BerichtResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
        '502':
          description: Geen enkel magazijn bereikbaar
          content:
            application/problem+json:
              schema:
                $ref: '#/components/schemas/Problem'
        '500':
          $ref: '#/components/responses/InternalServerError'

  /berichten/_zoeken:
    get:
      operationId: zoekBerichten
      summary: Zoeken in berichten
      description: |
        Zoekt in gecachte berichtrecords op basis van vrije tekst (onderwerp en afzender).
      tags:
        - berichten
      parameters:
        - $ref: '#/components/parameters/PageParam'
        - $ref: '#/components/parameters/PageSizeParam'
        - name: q
          in: query
          description: Zoektekst
          required: true
          schema:
            type: string
            minLength: 2
        - name: ontvanger
          in: query
          required: true
          description: Ontvanger (BSN of KVK-nummer)
          x-todo: "Ontvanger tzt uit security-context halen"
          schema:
            type: string
            minLength: 1
        - name: afzender
          in: query
          description: Filter op afzender (OIN)
          schema:
            type: string
      responses:
        '200':
          description: Zoekresultaten
          headers:
            API-Version:
              $ref: '#/components/headers/API-Version'
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/BerichtensessiecacheResponse'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '409':
          description: |
            Berichten zijn nog niet opgehaald of het ophalen is nog bezig.
            Roep eerst GET /berichten/_ophalen aan.
          content:
            application/problem+json:
              schema:
                $ref: '#/components/schemas/Problem'
        '500':
          $ref: '#/components/responses/InternalServerError'

  /berichten/_ophalen:
    get:
      operationId: ophalenBerichten
      summary: Berichten ophalen uit alle magazijnen (SSE-stream)
      description: |
        Start het ophalen van berichten uit alle aangesloten magazijnen.
        Retourneert een Server-Sent Events stream met voortgangsupdates per magazijn.

        **Event types:**
        - `magazijn-status` — Status per magazijn (BEZIG → OK / FOUT / TIMEOUT)
        - `ophalen-gereed` — Afsluitend event met totaalresultaat

        Na afloop zijn de opgehaalde berichten beschikbaar via `GET /berichten`.

        > **Implementatie-opmerking:** Dit endpoint wordt bewust niet via de OpenAPI generator
        > gegenereerd (zie `apisToGenerate` in pom.xml). De `jaxrs-spec` generator kan geen
        > SSE-endpoints genereren omdat het return-type `Multi<T>` (Mutiny reactive stream)
        > niet uitgedrukt kan worden in een standaard JAX-RS interface-signatuur. De
        > implementatie staat handmatig in `BerichtenOphalenResource.kt`.
      tags:
        - ophalen
      parameters:
        - name: ontvanger
          in: query
          required: true
          description: Ontvanger (BSN of KVK-nummer)
          x-todo: "Ontvanger tzt uit security-context halen"
          schema:
            type: string
            minLength: 1
      responses:
        '200':
          description: SSE-stream met ophaalstatus per magazijn
          headers:
            API-Version:
              $ref: '#/components/headers/API-Version'
          content:
            text/event-stream:
              schema:
                $ref: '#/components/schemas/MagazijnStatusEvent'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '409':
          description: |
            Berichten worden momenteel al opgehaald voor deze ontvanger.
            Wacht tot het ophalen is afgerond.
          content:
            application/problem+json:
              schema:
                $ref: '#/components/schemas/Problem'
        '500':
          $ref: '#/components/responses/InternalServerError'

components:
  parameters:
    PageParam:
      name: page
      in: query
      description: Paginanummer (0-based)
      schema:
        type: integer
        minimum: 0
        default: 0
    PageSizeParam:
      name: pageSize
      in: query
      description: Aantal resultaten per pagina
      schema:
        type: integer
        minimum: 1
        maximum: 100
        default: 20

  headers:
    API-Version:
      description: Versie van de API
      schema:
        type: string
        example: "0.1.0"

  schemas:
    Bericht:
      type: object
      required:
        - berichtId
        - afzender
        - ontvanger
        - onderwerp
        - tijdstip
        - magazijnId
      properties:
        berichtId:
          type: string
          format: uuid
          description: Uniek ID van het bericht
        afzender:
          type: string
          description: OIN van de afzender
        ontvanger:
          type: string
          description: BSN of KVK-nummer van de ontvanger
        onderwerp:
          type: string
          description: Onderwerp van het bericht
        tijdstip:
          type: string
          format: date-time
          description: Tijdstip van het bericht
        magazijnId:
          type: string
          description: ID van het bronmagazijn
        _links:
          $ref: '#/components/schemas/BerichtLinks'

    BerichtLinks:
      type: object
      properties:
        self:
          $ref: '#/components/schemas/Link'
        inhoud:
          $ref: '#/components/schemas/Link'

    Link:
      type: object
      properties:
        href:
          type: string
          format: uri

    BerichtensessiecacheResponse:
      type: object
      required:
        - berichten
        - page
        - pageSize
        - totalElements
        - totalPages
      properties:
        berichten:
          type: array
          items:
            $ref: '#/components/schemas/Bericht'
        page:
          type: integer
          description: Huidig paginanummer
        pageSize:
          type: integer
          description: Aantal resultaten per pagina
        totalElements:
          type: integer
          format: int64
          description: Totaal aantal resultaten
        totalPages:
          type: integer
          description: Totaal aantal pagina's
        _aggregatie:
          $ref: '#/components/schemas/AggregationStatus'
        _links:
          $ref: '#/components/schemas/PaginationLinks'

    AggregationStatus:
      type: object
      properties:
        status:
          type: string
          enum: [BEZIG, GEREED]
          description: Status van het ophaalproces
        totaalMagazijnen:
          type: integer
          description: Totaal aantal geconfigureerde magazijnen
        geslaagd:
          type: integer
          description: Aantal magazijnen dat succesvol is bevraagd
        mislukt:
          type: integer
          description: Aantal magazijnen dat een fout gaf

    MagazijnStatusEvent:
      type: object
      description: SSE event met ophaalstatus per magazijn
      properties:
        event:
          type: string
          enum: [magazijn-status, ophalen-gereed]
        magazijnId:
          type: string
        naam:
          type: string
        status:
          type: string
          enum: [BEZIG, OK, FOUT, TIMEOUT]
        aantalBerichten:
          type: integer
        foutmelding:
          type: string
        totaalBerichten:
          type: integer
        geslaagd:
          type: integer
        mislukt:
          type: integer
        totaalMagazijnen:
          type: integer

    PaginationLinks:
      type: object
      properties:
        self:
          $ref: '#/components/schemas/Link'
        first:
          $ref: '#/components/schemas/Link'
        last:
          $ref: '#/components/schemas/Link'
        prev:
          $ref: '#/components/schemas/Link'
        next:
          $ref: '#/components/schemas/Link'

    BerichtResponse:
      type: object
      required:
        - berichtId
        - afzender
        - ontvanger
        - onderwerp
        - tijdstip
        - magazijnId
      properties:
        berichtId:
          type: string
          format: uuid
        afzender:
          type: string
        ontvanger:
          type: string
        onderwerp:
          type: string
        tijdstip:
          type: string
          format: date-time
        magazijnId:
          type: string
        _links:
          $ref: '#/components/schemas/BerichtLinks'

    Problem:
      type: object
      description: Problem Details (RFC 9457)
      properties:
        type:
          type: string
          format: uri
          default: "about:blank"
        title:
          type: string
        status:
          type: integer
        detail:
          type: string
        instance:
          type: string
          format: uri

  responses:
    BadRequest:
      description: Ongeldige request parameters
      content:
        application/problem+json:
          schema:
            $ref: '#/components/schemas/Problem'
    Unauthorized:
      description: Niet geauthenticeerd
      content:
        application/problem+json:
          schema:
            $ref: '#/components/schemas/Problem'
    Forbidden:
      description: Niet geautoriseerd
      content:
        application/problem+json:
          schema:
            $ref: '#/components/schemas/Problem'
    NotFound:
      description: Resource niet gevonden
      content:
        application/problem+json:
          schema:
            $ref: '#/components/schemas/Problem'
    InternalServerError:
      description: Interne serverfout
      content:
        application/problem+json:
          schema:
            $ref: '#/components/schemas/Problem'
