# Application
quarkus.application.name=berichtenuitvraag
quarkus.application.version=0.1.0

# HTTP
# 8086: naast sessiecache (8080) en magazijn (8090) in dev-mode draaibaar
# zonder poort-conflict; compose.yaml gebruikt 8081/8082 voor wiremock-mocks.
quarkus.http.port=8086

# Security headers op ÁLLE HTTP-responses (ook /openapi.json, /q/health,
# /q/metrics, dev-UI) — niet alleen op JAX-RS-paden. De SecurityHeadersFilter
# in fbs-common dekt JAX-RS responses; deze Quarkus-config dekt de rest.
quarkus.http.header."X-Frame-Options".value=DENY
quarkus.http.header."X-Content-Type-Options".value=nosniff
quarkus.http.header."Strict-Transport-Security".value=max-age=31536000; includeSubDomains; preload
quarkus.http.header."Content-Security-Policy".value=frame-ancestors 'none'
quarkus.http.header."Referrer-Policy".value=no-referrer
# De JAX-RS-responses bevatten persoonsgebonden berichtensamenvattingen (gedeelde
# URL-key over `X-Ontvanger` heen) — `no-store` voorkomt dat proxies/browsers die
# data cachen. Bewust globaal gezet (dus óók op /openapi.json, /q/health): voor die
# niet-persoonsgebonden paden onschadelijk, en het scheelt een padspecifieke regel.
# Defense-in-depth bovenop TLS.
quarkus.http.header."Cache-Control".value=no-store

# OpenAPI / Swagger UI (ADR: spec MOET op /openapi.json beschikbaar zijn)
quarkus.smallrye-openapi.path=/openapi.json
quarkus.swagger-ui.always-include=true
quarkus.smallrye-openapi.info-title=FBS Berichten Uitvraag API
quarkus.smallrye-openapi.info-version=0.1.0

# JSON: optionele velden weglaten i.p.v. null (zoals andere services).
quarkus.jackson.serialization-inclusion=non_null

# Redis — backing store van de in-process sessiecache (fbs-berichtensessiecache).
# Dev/prod: compose Redis, geen Dev Services; tests schakelen Dev Services per profiel in.
%dev.quarkus.redis.hosts=redis://localhost:6379
%prod.quarkus.redis.hosts=${REDIS_HOSTS:redis://localhost:6379}
%dev.quarkus.redis.devservices.enabled=false
%prod.quarkus.redis.devservices.enabled=false

# Cache TTL (sliding): elke succesvolle read verlengt TTL op sessie-keys en betroffen
# berichthashes. Default 12u dekt een halve werkdag-sessie zonder herhaalde ophaal-flow;
# korter zetten kan via `berichtensessiecache.ttl=PT1H` per omgeving wanneer geheugendruk
# daar om vraagt.
berichtensessiecache.ttl=PT12H

# Aparte, korte vangnet-TTL voor de aggregatie-lock (SETNX) en de BEZIG-status. Losgekoppeld
# van de cache-`ttl`: crasht een pod midden in aggregatie, dan zelfheelt de lock/BEZIG-status na
# deze timeout i.p.v. de ontvanger tot 12u te blokkeren voor opnieuw `_ophalen`. Moet ruim boven de
# normale aggregatieduur (profiel.resolver.outer-await-seconds + cache-await) liggen.
berichtensessiecache.aggregation-lock-ttl=PT2M

# Defensieve grenzen op binnenkomende cache-entries (cache-store en magazijn-mapping).
# Geen functionele limieten — alleen tegen pathologische/kwaadaardige input.
berichtensessiecache.bericht.max-bijlagen=100
berichtensessiecache.bericht.max-bijlage-naam-lengte=255

# Max blocking-await op één Redis-commando vanaf de @Blocking worker-thread tijdens
# ophaal-orkestratie (lock-acquire, status-updates, cleanup). Overschreden await-deadline
# faalt de ophaalstap (await-timeout → 503; cleanup-pad slikt en leunt op de TTL). Moet > 0
# (afgedwongen in valideerTimeouts). Losse knop: geen invariant met de andere timeouts.
berichtensessiecache.cache-await-timeout-seconds=5
%prod.berichtensessiecache.cache-await-timeout-seconds=${CACHE_AWAIT_TIMEOUT_SECONDS:5}

# Magazijnen-configuratie voor de sessiecache-aggregatie (id → url/naam/afzenders).
# URLs uit env-vars in prod/staging/acceptatie; MagazijnClientFactory dwingt
# https:// af via OutboundTlsValidator buiten dev/test (BIO 13.2.1). Dezelfde
# MAGAZIJN_*_URL-env-vars voeden ook `magazijnen.urls.*` (bijlage-/write-routering).
magazijnen.instances.magazijn-a.url=${MAGAZIJN_A_URL}
magazijnen.instances.magazijn-a.naam=Magazijn A
magazijnen.instances.magazijn-b.url=${MAGAZIJN_B_URL}
magazijnen.instances.magazijn-b.naam=Magazijn B
%test.magazijnen.instances.magazijn-a.url=http://localhost:8081
%test.magazijnen.instances.magazijn-b.url=http://localhost:8082

# Magazijn-client timeouts (MagazijnClientFactory, aggregatie-pad). Zonder read-timeout
# blokkeert een hangend magazijn de worker-thread/socket onbegrensd; de Mutiny
# `ifNoItem`-query-timeout faalt de Uni wel maar interrupt de geblokkeerde call niet.
# Invariant: read-timeout-ms MOET groter zijn dan
# berichtensessiecache.magazijn-query-timeout-seconds (×1000), zodat de query-timeout als
# eerste aanslaat (TIMEOUT-event) en deze timeout de socket alsnog vrijgeeft als vangnet.
# Bij startup afgedwongen in BerichtensessiecacheService.valideerTimeouts(). Eigen prefix
# (niet `magazijnen.`): die prefix is een @ConfigMapping-root en SmallRye weigert losse
# properties eronder (SRCFG00050).
magazijn-client.connect-timeout-ms=2000
magazijn-client.read-timeout-ms=12000
berichtensessiecache.magazijn-query-timeout-seconds=10

# MOZA Profiel Service — gedeelde upstream met berichtenmagazijn.
# REST-client + DTO's wonen in fbs-common (nl.rijksoverheid.moz.fbs.common.profiel).
# WireMock-stub op localhost:8089 (zie compose.yaml + wiremock/profiel-service/).
# TODO(#552): vóór productie expliciete trust-store + (mogelijk) key-store voor
# PKIoverheid-certificaat-validatie configureren (NeRDS 6.2). Nu vertrouwt de
# client op JVM-default trust-store; ProfielServiceEndpointValidator dwingt
# wel https:// af in prod/staging/acceptatie, maar niet de certificaat-keten.
quarkus.rest-client.profiel-service.url=${PROFIEL_SERVICE_URL}
%dev.quarkus.rest-client.profiel-service.url=http://localhost:8089
%test.quarkus.rest-client.profiel-service.url=http://localhost:8089
quarkus.rest-client.profiel-service.connect-timeout=2000
quarkus.rest-client.profiel-service.read-timeout=5000
# Connection pool + keep-alive: zonder dit doet elke ophalen-request een nieuwe
# TCP+TLS handshake naar Profiel (~50-200ms RTT-overhead onder PKIoverheid).
# Pool-size 20 dekt typische concurrency; connection-ttl 300s laat de pool
# periodiek refreshen (DNS-rebind- en TLS-rotate-vriendelijk).
quarkus.rest-client.profiel-service.connection-pool-size=20
quarkus.rest-client.profiel-service.connection-ttl=300
quarkus.rest-client.profiel-service.keep-alive-enabled=true

# @Retry-tuning per omgeving (MP Fault Tolerance config-override).
# Dev/test: jitter=0 voor deterministisch test-gedrag (geen flakiness in retry-timing-asserties).
# Prod/staging/acceptatie: jitter > 0 spreidt retry-pieken bij upstream-storm
# (thundering-herd-protection). Format: <FQN>/<method>/Retry/<attribute>.
nl.rijksoverheid.moz.fbs.common.profiel.ProfielServiceClient/getPartij/Retry/jitter=0
%prod.nl.rijksoverheid.moz.fbs.common.profiel.ProfielServiceClient/getPartij/Retry/jitter=${PROFIEL_RETRY_JITTER:200}
%staging.nl.rijksoverheid.moz.fbs.common.profiel.ProfielServiceClient/getPartij/Retry/jitter=${PROFIEL_RETRY_JITTER:200}
%acceptatie.nl.rijksoverheid.moz.fbs.common.profiel.ProfielServiceClient/getPartij/Retry/jitter=${PROFIEL_RETRY_JITTER:100}

# Resolver timeout-budget. Outer-await MOET groter zijn dan inner-timeout
# (startup-validatie in BerichtensessiecacheService.valideerTimeouts); anders
# slaat de outer eerst aan en verliest de caller de timeout-classificatie.
# Inner-budget berekening: 3 pogingen × read-timeout 5s + 2 × retry-delay 200ms ≈ 15.4s.
# 18s laat elke retry zijn beurt en houdt ~2s marge onder outer (25s).
# LET OP: valideerTimeouts borgt alleen outer > inner, NIET inner > retry-budget. Bij het
# verhogen van PROFIEL_RETRY_JITTER (extra retry-spreiding) of de read-timeout MOET je het
# inner-timeout-budget hier herijken, anders kan de inner-timeout een nog-lopende retry
# afkappen i.p.v. de upstream-traagheid.
profiel.resolver.inner-timeout-seconds=18
profiel.resolver.outer-await-seconds=25
%prod.profiel.resolver.inner-timeout-seconds=${PROFIEL_INNER_TIMEOUT:18}
%prod.profiel.resolver.outer-await-seconds=${PROFIEL_OUTER_AWAIT:25}

# In-JVM Caffeine-cache (zie ProfielMagazijnResolver.magazijnSetCache). Absorbeert
# burst-load richting Profiel-service voor dezelfde ontvanger binnen het TTL-window.
# Korte TTL zorgt dat voorkeurs-mutaties binnen tientallen seconden zichtbaar worden;
# max-size capt heap-gebruik bij hoge unieke-ontvanger-rate. Cache wordt UITSLUITEND
# bij succes gevuld — geen failure-cache, dus geen 503-loop bij tijdelijke storing.
profiel.resolver.cache.ttl-seconds=30
profiel.resolver.cache.max-size=10000
# Per-omgeving tuning via env-var, consistent met PROFIEL_INNER_TIMEOUT/OUTER_AWAIT.
%prod.profiel.resolver.cache.ttl-seconds=${PROFIEL_CACHE_TTL_SECONDS:30}
%prod.profiel.resolver.cache.max-size=${PROFIEL_CACHE_MAX_SIZE:10000}
%staging.profiel.resolver.cache.ttl-seconds=${PROFIEL_CACHE_TTL_SECONDS:30}
%acceptatie.profiel.resolver.cache.ttl-seconds=${PROFIEL_CACHE_TTL_SECONDS:30}
# Tests: TTL=0s disable't de cache effectief (Caffeine `expireAfterWrite(0)` levert
# nooit een hit). Specifiek cache-gedrag wordt in een dedicated @TestProfile getest.
%test.profiel.resolver.cache.ttl-seconds=0

# Afzender-OIN(s) per magazijn — zie MagazijnenConfig.MagazijnInstance.afzenders.
# Prod/staging/acceptatie via env-var (PKIoverheid-trustset gekoppeld in #552);
# dev/test gebruiken vaste test-OINs voor WireMock-stub-determinisme.
magazijnen.instances.magazijn-a.afzenders=${MAGAZIJN_A_AFZENDERS}
magazijnen.instances.magazijn-b.afzenders=${MAGAZIJN_B_AFZENDERS}
%dev.magazijnen.instances.magazijn-a.afzenders=00000001003214345000
%dev.magazijnen.instances.magazijn-b.afzenders=00000001823288444000
%test.magazijnen.instances.magazijn-a.afzenders=00000001003214345000
%test.magazijnen.instances.magazijn-b.afzenders=00000001823288444000

# %dev: twee lokaal-draaiende berichtenmagazijn-instances. Magazijn A op de
# default-poort (8090); magazijn B start je in een tweede terminal op 8091 met:
#     ./mvnw quarkus:dev -pl services/berichtenmagazijn -Dquarkus.http.port=8091
%dev.magazijnen.instances.magazijn-a.url=http://localhost:8090
%dev.magazijnen.instances.magazijn-b.url=http://localhost:8091

# Mapping van decentrale magazijn-identifier → base-URL. Gebruikt door
# MagazijnRouter voor zowel bijlage-download als patch/verwijder. De ID's
# moeten overeenkomen met `magazijnen.instances.*` in de sessiecache-config
# (die levert het `magazijnId` mee bij elk bericht); bij een mismatch krijgt
# de client een 502.
# Default (compose): WireMock-stubs op 8081/8082, gelijk aan sessiecache.
magazijnen.urls.magazijn-a=${MAGAZIJN_A_URL:http://localhost:8081}
magazijnen.urls.magazijn-b=${MAGAZIJN_B_URL:http://localhost:8082}

# Begrensde timeouts op de magazijn-REST-client zodat een hangende magazijn-
# connectie een uitvraag-request niet onbeperkt blokkeert; de ProcessingException
# die volgt op een timeout mapt via mapUpstreamFout naar 502. Defaults uit
# MagazijnenConfig.Client (PT2S/PT10S) — uncomment om per omgeving te overrulen.
#magazijnen.client.connect-timeout=PT2S
#magazijnen.client.read-timeout=PT10S

# %dev: twee lokaal-draaiende berichtenmagazijn-instances op 8090/8091
# (zie sessiecache-config voor de start-instructie).
%dev.magazijnen.urls.magazijn-a=http://localhost:8090
%dev.magazijnen.urls.magazijn-b=http://localhost:8091

# Aanmeld-webhook: bewaartijd van de idempotentie-marker (CloudEvents `id`) in Redis.
# Moet ruim boven het retry-venster van de publicatie-stream liggen (magazijn-backoff-
# plafond PT1H) zodat een her-aflevering binnen dat venster als duplicaat herkend wordt.
# Default uit AanmeldConfig (PT24H) — uncomment om per omgeving te overrulen.
#aanmeld.deduplicatie.ttl=PT24H

# Logboek Dataverwerkingen (AVG Art. 30) — geen fallback-defaults voor credentials
# en endpoint, zodat de service faalt te starten als env-vars ontbreken; anders draait
# LDV stilletjes op bekende defaults of (erger) een onversleuteld endpoint.
logboekdataverwerking.enabled=true
logboekdataverwerking.service-name=berichtenuitvraag
logboekdataverwerking.clickhouse.endpoint=${LDV_CLICKHOUSE_ENDPOINT}
logboekdataverwerking.clickhouse.username=${CLICKHOUSE_USERNAME}
logboekdataverwerking.clickhouse.password=${CLICKHOUSE_PASSWORD}
logboekdataverwerking.clickhouse.database=ldv_logging
logboekdataverwerking.clickhouse.table=logboek_dataverwerkingen

# Voor dev/test: veilige defaults zodat lokaal draaien zonder env-vars werkt.
# In %prod blijft de basisproperty `${LDV_CLICKHOUSE_ENDPOINT}` zonder default; operators
# MOETEN een TLS-endpoint (https://) zetten conform BIO 13.2.1 (persoonsgegevens
# versleuteld over netwerk).
%dev.logboekdataverwerking.clickhouse.endpoint=http://localhost:8123
%dev.logboekdataverwerking.clickhouse.username=ldv
%dev.logboekdataverwerking.clickhouse.password=ldv
%test.logboekdataverwerking.clickhouse.endpoint=http://localhost:8123
%test.logboekdataverwerking.clickhouse.username=ldv
%test.logboekdataverwerking.clickhouse.password=ldv

# Quarkus bean discovery voor logboekdataverwerking-wrapper
quarkus.index-dependency.ldv.group-id=nl.mijnoverheidzakelijk.ldv
quarkus.index-dependency.ldv.artifact-id=logboekdataverwerking-wrapper

# Quarkus bean discovery voor de in-process sessiecache-library
quarkus.index-dependency.sessiecache.group-id=nl.rijksoverheid.moz
quarkus.index-dependency.sessiecache.artifact-id=fbs-berichtensessiecache

# Logging
# DEBUG alleen in dev/test: in %prod blijft het op INFO (geen override) zodat
# DEBUG-regels — die per ongeluk PII zouden kunnen bevatten (NeRDS 7.1) — en de
# log-volume-overhead niet naar productie lekken.
quarkus.log.level=INFO
%dev.quarkus.log.category."nl.rijksoverheid.moz".level=DEBUG
%test.quarkus.log.category."nl.rijksoverheid.moz".level=DEBUG
