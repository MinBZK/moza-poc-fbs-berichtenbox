# Test configuratie
quarkus.http.test-port=0

# Logboek Dataverwerkingen uitgeschakeld in tests: ClickHouse-endpoint is
# in CI/lokale unit-tests niet bereikbaar; de wrapper laat de ProcessingHandler
# anders falen met een ConnectionInitiationException tijdens lazy init.
logboekdataverwerking.enabled=false

# Profiel-service rest-client URL is verplicht omdat fbs-common ProfielServiceClient
# CDI-laadt; uitvraag-tests doen geen profiel-call maar config-validatie eist een URL.
quarkus.rest-client.profiel-service.url=http://localhost:8089

# Redis uit in de standaard-testsuite: de sessiecache-facade wordt gemockt
# (MockSessiecache); alleen het E2E-profiel (RealRedisE2eProfile) schakelt
# Redis Dev Services in. De beans van de library zijn lazy, dus zonder
# facade-gebruik wordt er geen verbinding opgezet.
quarkus.redis.devservices.enabled=false
quarkus.redis.hosts=redis://localhost:6379
