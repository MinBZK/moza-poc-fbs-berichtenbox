# Deploy naar ZAD (Operations Manager) via RijksICTGilde/zad-actions.
#
# DRIE losse ZAD-projecten (deployments zijn geïsoleerd; cross-project bereik je via de
# https-ingress-URLs `<component>-<deployment>-<projectid>.rig.prd1.gn2.quattro.rijksapps.nl`):
#
#   uitvraag    (mpfb-8wh)     componenten: redis + clickhouse + uitvraag
#   profiel     (mpfpsm-lcl)   componenten: profiel (WireMock-stub)
#   magazijnen  (mpfm-w3h)     componenten: clickhouse + magazijna + magazijnb
#
# Redis (sessiecache) en ClickHouse (LDV) draaien per project intern (centrale ZAD-Redis
# v7 mist RediSearch; ClickHouse niet deelbaar tussen deployments). Interne calls zijn
# http: redis via redis://…:6379, LDV via http://…:8123 (de %prod-https-eis op het LDV-
# endpoint staat uit via FBS_LDV_UNSAFE_ALLOW_PLAINTEXT_ENDPOINT — bewust onveilig, BSN
# plaintext, alleen verantwoord bij mesh-mTLS/test-data).
#
# App-config woont NIET hier (de deploy-action draagt geen env). Configureer de runtime-env
# éénmalig per component op de `test`-deployment van elk project in Operations Manager;
# previews erven via `clone-from: test`. Cross-project-URLs wijzen naar de STABIELE `test`-
# deployments (de deploy-action kan geen per-PR-env injecteren), bv. op uitvraag(test):
#   MAGAZIJN_A_URL=https://magazijna-test-mpfm-w3h.rig...    (en magazijnb)
#   PROFIEL_SERVICE_URL=https://profiel-test-mpfpsm-lcl.rig...
# Een uitvraag-preview praat dus met de `test`-magazijnen/profiel; per-PR magazijn/profiel-
# previews zijn losse smoke-tests van hun eigen API.
#
# Repo-secrets (Settings → Secrets and variables → Actions):
#   ZAD_API_KEY_UITVRAAG    — API-key project mpfb-8wh
#   ZAD_API_KEY_PROFIEL     — API-key project mpfpsm-lcl
#   ZAD_API_KEY_MAGAZIJNEN  — API-key project mpfm-w3h
#   GH_ADMIN_TOKEN          — PAT met repo-admin (env-cleanup; GITHUB_TOKEN mag dat niet;
#                             naam zónder `GITHUB_`-prefix — die is gereserveerd)
#
# TODO(SHA-pin): externe actions op commit-SHA pinnen (Scorecard) vóór dit productie is.

name: Deploy ZAD

on:
  pull_request:
    types: [opened, synchronize, reopened, closed]
  push:
    branches: [main]

# Eén lopende deploy per PR; nieuwe push annuleert de vorige preview-deploy.
concurrency:
  group: zad-deploy-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: false

env:
  REGISTRY: ghcr.io
  PROJECT_UITVRAAG: mpfb-8wh
  PROJECT_PROFIEL: mpfpsm-lcl
  PROJECT_MAGAZIJNEN: mpfm-w3h
  # Publieke infra-images (niet door de cleanup verwijderd). Pin in sync met compose.yaml
  # (zie pin-consistency.yml).
  REDIS_IMAGE: redis/redis-stack-server:7.4.0-v3
  CLICKHOUSE_IMAGE: clickhouse/clickhouse-server:26.5

jobs:
  # Afgeleide waarden op één plek: image-tag + lowercase GHCR-owner (GHCR eist lowercase).
  meta:
    runs-on: ubuntu-latest
    outputs:
      tag: ${{ steps.m.outputs.tag }}
      owner: ${{ steps.m.outputs.owner }}
    steps:
      - id: m
        run: |
          if [ "${{ github.event_name }}" = "pull_request" ]; then
            echo "tag=pr-${{ github.event.number }}" >> "$GITHUB_OUTPUT"
          else
            echo "tag=main-${GITHUB_SHA::7}" >> "$GITHUB_OUTPUT"
          fi
          echo "owner=${GITHUB_REPOSITORY_OWNER,,}" >> "$GITHUB_OUTPUT"

  # Bouw + push de service-images met jib (geen Dockerfile). Niet op PR-close.
  build:
    if: github.event_name == 'push' || github.event.action != 'closed'
    needs: meta
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    strategy:
      matrix:
        service: [berichtenuitvraag, berichtenmagazijn]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'
      - name: Build + push image (jib)
        # Variabele waarden via env i.p.v. inline interpolatie (defense-in-depth injectie).
        env:
          SERVICE: ${{ matrix.service }}
          GROUP: ${{ needs.meta.outputs.owner }}
          TAG: ${{ needs.meta.outputs.tag }}
          GHCR_USER: ${{ github.actor }}
          GHCR_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          ./mvnw -B package -DskipTests \
            -pl "services/$SERVICE" -am \
            -Dquarkus.container-image.build=true \
            -Dquarkus.container-image.push=true \
            -Dquarkus.container-image.registry="$REGISTRY" \
            -Dquarkus.container-image.group="$GROUP" \
            -Dquarkus.container-image.tag="$TAG" \
            -Dquarkus.container-image.username="$GHCR_USER" \
            -Dquarkus.container-image.password="$GHCR_TOKEN"

  # Profiel-stub: WireMock-image met de mappings erin gebakken (plain docker, geen jib).
  build-profiel-stub:
    if: github.event_name == 'push' || github.event.action != 'closed'
    needs: meta
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4
      - name: Build + push profiel-stub
        env:
          OWNER: ${{ needs.meta.outputs.owner }}
          TAG: ${{ needs.meta.outputs.tag }}
          GHCR_USER: ${{ github.actor }}
          GHCR_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          echo "$GHCR_TOKEN" | docker login "$REGISTRY" -u "$GHCR_USER" --password-stdin
          IMG="$REGISTRY/$OWNER/fbs-profiel-stub:$TAG"
          docker build -t "$IMG" wiremock/profiel-service
          docker push "$IMG"

  # PR-preview: per project een deploy naar deployment `pr-<n>`, config geërfd van `test`.
  deploy-preview:
    if: github.event_name == 'pull_request' && github.event.action != 'closed'
    needs: [meta, build, build-profiel-stub]
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
    environment:
      name: pr-${{ github.event.pull_request.number }}
      url: ${{ steps.deploy-uitvraag.outputs.url }}
    env:
      DEPLOYMENT: pr-${{ github.event.pull_request.number }}
    steps:
      # wait-for-ready blijft uit tot de services een health-endpoint hebben
      # (quarkus-smallrye-health + readiness-path: /q/health/ready).
      - name: Deploy uitvraag-project
        id: deploy-uitvraag
        uses: RijksICTGilde/zad-actions/deploy@v4
        with:
          api-key: ${{ secrets.ZAD_API_KEY_UITVRAAG }}
          project-id: ${{ env.PROJECT_UITVRAAG }}
          deployment-name: ${{ env.DEPLOYMENT }}
          clone-from: test
          comment-on-pr: 'true'
          wait-for-ready: 'false'
          components: |
            [
              {"name": "redis", "image": "${{ env.REDIS_IMAGE }}"},
              {"name": "clickhouse", "image": "${{ env.CLICKHOUSE_IMAGE }}"},
              {"name": "uitvraag", "image": "${{ env.REGISTRY }}/${{ needs.meta.outputs.owner }}/fbs-berichtenuitvraag:${{ needs.meta.outputs.tag }}"}
            ]

      - name: Deploy profiel-project
        uses: RijksICTGilde/zad-actions/deploy@v4
        with:
          api-key: ${{ secrets.ZAD_API_KEY_PROFIEL }}
          project-id: ${{ env.PROJECT_PROFIEL }}
          deployment-name: ${{ env.DEPLOYMENT }}
          clone-from: test
          wait-for-ready: 'false'
          components: |
            [
              {"name": "profiel", "image": "${{ env.REGISTRY }}/${{ needs.meta.outputs.owner }}/fbs-profiel-stub:${{ needs.meta.outputs.tag }}"}
            ]

      - name: Deploy magazijnen-project
        uses: RijksICTGilde/zad-actions/deploy@v4
        with:
          api-key: ${{ secrets.ZAD_API_KEY_MAGAZIJNEN }}
          project-id: ${{ env.PROJECT_MAGAZIJNEN }}
          deployment-name: ${{ env.DEPLOYMENT }}
          clone-from: test
          wait-for-ready: 'false'
          components: |
            [
              {"name": "clickhouse", "image": "${{ env.CLICKHOUSE_IMAGE }}"},
              {"name": "magazijna", "image": "${{ env.REGISTRY }}/${{ needs.meta.outputs.owner }}/fbs-berichtenmagazijn:${{ needs.meta.outputs.tag }}"},
              {"name": "magazijnb", "image": "${{ env.REGISTRY }}/${{ needs.meta.outputs.owner }}/fbs-berichtenmagazijn:${{ needs.meta.outputs.tag }}"}
            ]

  # Opruimen bij PR-sluiten: per project de deployment + ÓNZE images. De GitHub-environment
  # (één per PR) ruimt alleen de uitvraag-stap op; de andere zetten delete-github-env uit.
  cleanup-preview:
    if: github.event_name == 'pull_request' && github.event.action == 'closed'
    needs: meta
    runs-on: ubuntu-latest
    permissions:
      deployments: write
      packages: write
      pull-requests: write
    env:
      DEPLOYMENT: pr-${{ github.event.pull_request.number }}
    steps:
      - name: Cleanup uitvraag-project
        uses: RijksICTGilde/zad-actions/cleanup@v4
        with:
          api-key: ${{ secrets.ZAD_API_KEY_UITVRAAG }}
          project-id: ${{ env.PROJECT_UITVRAAG }}
          deployment-name: ${{ env.DEPLOYMENT }}
          delete-github-env: 'true'
          delete-github-deployments: 'true'
          delete-container: 'true'
          containers: |
            [
              {"org": "${{ needs.meta.outputs.owner }}", "name": "fbs-berichtenuitvraag", "tag": "pr-${{ github.event.number }}"}
            ]
          github-admin-token: ${{ secrets.GH_ADMIN_TOKEN }}

      - name: Cleanup profiel-project
        uses: RijksICTGilde/zad-actions/cleanup@v4
        with:
          api-key: ${{ secrets.ZAD_API_KEY_PROFIEL }}
          project-id: ${{ env.PROJECT_PROFIEL }}
          deployment-name: ${{ env.DEPLOYMENT }}
          delete-github-env: 'false'
          delete-container: 'true'
          containers: |
            [
              {"org": "${{ needs.meta.outputs.owner }}", "name": "fbs-profiel-stub", "tag": "pr-${{ github.event.number }}"}
            ]

      - name: Cleanup magazijnen-project
        uses: RijksICTGilde/zad-actions/cleanup@v4
        with:
          api-key: ${{ secrets.ZAD_API_KEY_MAGAZIJNEN }}
          project-id: ${{ env.PROJECT_MAGAZIJNEN }}
          deployment-name: ${{ env.DEPLOYMENT }}
          delete-github-env: 'false'
          delete-container: 'true'
          containers: |
            [
              {"org": "${{ needs.meta.outputs.owner }}", "name": "fbs-berichtenmagazijn", "tag": "pr-${{ github.event.number }}"}
            ]

  # Push naar main → per project de `test`-deployment (de baseline waarvan previews klonen;
  # env/secrets configureer je daar in Operations Manager).
  deploy-test:
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    needs: [meta, build, build-profiel-stub]
    runs-on: ubuntu-latest
    permissions:
      contents: read
    environment:
      name: test
    steps:
      - name: Deploy uitvraag-project (test)
        uses: RijksICTGilde/zad-actions/deploy@v4
        with:
          api-key: ${{ secrets.ZAD_API_KEY_UITVRAAG }}
          project-id: ${{ env.PROJECT_UITVRAAG }}
          deployment-name: test
          components: |
            [
              {"name": "redis", "image": "${{ env.REDIS_IMAGE }}"},
              {"name": "clickhouse", "image": "${{ env.CLICKHOUSE_IMAGE }}"},
              {"name": "uitvraag", "image": "${{ env.REGISTRY }}/${{ needs.meta.outputs.owner }}/fbs-berichtenuitvraag:${{ needs.meta.outputs.tag }}"}
            ]

      - name: Deploy profiel-project (test)
        uses: RijksICTGilde/zad-actions/deploy@v4
        with:
          api-key: ${{ secrets.ZAD_API_KEY_PROFIEL }}
          project-id: ${{ env.PROJECT_PROFIEL }}
          deployment-name: test
          components: |
            [
              {"name": "profiel", "image": "${{ env.REGISTRY }}/${{ needs.meta.outputs.owner }}/fbs-profiel-stub:${{ needs.meta.outputs.tag }}"}
            ]

      - name: Deploy magazijnen-project (test)
        uses: RijksICTGilde/zad-actions/deploy@v4
        with:
          api-key: ${{ secrets.ZAD_API_KEY_MAGAZIJNEN }}
          project-id: ${{ env.PROJECT_MAGAZIJNEN }}
          deployment-name: test
          components: |
            [
              {"name": "clickhouse", "image": "${{ env.CLICKHOUSE_IMAGE }}"},
              {"name": "magazijna", "image": "${{ env.REGISTRY }}/${{ needs.meta.outputs.owner }}/fbs-berichtenmagazijn:${{ needs.meta.outputs.tag }}"},
              {"name": "magazijnb", "image": "${{ env.REGISTRY }}/${{ needs.meta.outputs.owner }}/fbs-berichtenmagazijn:${{ needs.meta.outputs.tag }}"}
            ]
