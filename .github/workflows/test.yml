name: Test

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions: read-all

concurrency:
  group: test-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # Bepaalt of er iets buiten documentatie (docs/, *.md) is gewijzigd. De zware test-job is
  # hieraan gegate, maar de workflow blijft triggeren zodat de required status check `test`
  # ook bij een docs-only PR gerapporteerd wordt: een via `if` overgeslagen job telt als
  # 'skipped' = succes voor branch protection. Een workflow-niveau paths-filter zou de check
  # juist nooit rapporteren en de PR eeuwig blokkeren.
  changes:
    runs-on: ubuntu-latest
    outputs:
      run: ${{ steps.filter.outputs.run }}
    steps:
      - name: Detecteer niet-documentatie wijzigingen
        id: filter
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          EVENT: ${{ github.event_name }}
          REPO: ${{ github.repository }}
          PR: ${{ github.event.pull_request.number }}
        run: |
          if [ "$EVENT" != "pull_request" ]; then
            echo "run=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          # Fail-safe naar draaien: kan de bestandenlijst niet opgehaald worden (API-hik,
          # rate-limit), dan de code-checks TÓCH draaien i.p.v. stil overslaan. Een overslaan-
          # op-fout zou als 'skipped' (= succes) doortellen in de deploy-gate en ongeteste code
          # laten deployen.
          if ! files=$(gh api --paginate "repos/$REPO/pulls/$PR/files" --jq '.[].filename'); then
            echo "::warning::Kon gewijzigde bestanden niet ophalen — code-checks draaien fail-safe."
            echo "run=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          echo "Gewijzigde bestanden:"
          printf '%s\n' "$files"
          if printf '%s\n' "$files" | grep -qvE '(^docs/|\.md$)'; then
            echo "run=true" >> "$GITHUB_OUTPUT"
          else
            echo "Alleen documentatie gewijzigd — code-checks overgeslagen."
            echo "run=false" >> "$GITHUB_OUTPUT"
          fi

  test:
    needs: changes
    if: needs.changes.outputs.run == 'true'
    runs-on: ubuntu-latest
    # pull-requests: write voor de coverage-PR-comment (madrapps/jacoco-report).
    permissions:
      contents: read
      pull-requests: write
    # Quarkus Dev Services (Testcontainers) start Redis Stack + WireMock voor integratietests.
    # Geen `services:` block nodig — alle tests draaien in de `test` Maven-phase
    # (JaCoCo coverage-check incluis), dus `mvnw test` op root volstaat.
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - uses: actions/setup-java@1bcf9fb12cf4aa7d266a90ae39939e61372fe520 # v5.4.0
        with:
          distribution: temurin
          java-version: 21
          cache: maven
      - name: Test
        run: ./mvnw -B test
      # Coverage-zichtbaarheid op PR-niveau. Bewust GitHub-native (madrapps/jacoco-report)
      # i.p.v. Codecov: geen externe SaaS, geen upload-token, geen extra supply-chain-
      # oppervlak (Codecov kende in 2021 een uploader-compromittering). JaCoCo levert al een
      # XML-rapport per service; deze action leest dat en plaatst de diff als PR-comment.
      # De harde 90%-gate blijft de JaCoCo `check` in de build; deze drempels staan op 0
      # zodat de comment informatief is en de PR niet extra blokkeert.
      #
      # Lees het `target/site/jacoco`-rapport (jacoco-maven-plugin), NIET
      # `target/jacoco-report` (auto-rapport van de quarkus-jacoco-extensie). De
      # quarkus-variant telt alleen `@QuarkusTest`-data en past geen excludes toe, dus
      # gegenereerde OpenAPI-klassen (`api.**`) tellen als onafgedekt mee — dat drukt het
      # cijfer kunstmatig (bv. ~38% i.p.v. ~95% voor dezelfde module). Het site/jacoco-
      # rapport hanteert dezelfde excludes als de 90%-gate, dus de comment spiegelt de gate.
      # Glob op `services/*` + `libraries/*` zodat nieuwe modules (services én gedeelde
      # libraries zoals fbs-common) automatisch meegenomen worden.
      - name: JaCoCo coverage als PR-comment
        if: github.event_name == 'pull_request'
        uses: madrapps/jacoco-report@e51ce1f46f7f8b5331593f935e59cbaf44b84920 # v1.8.0
        with:
          paths: |
            ${{ github.workspace }}/services/*/target/site/jacoco/jacoco.xml
            ${{ github.workspace }}/libraries/*/target/site/jacoco/jacoco.xml
          token: ${{ secrets.GITHUB_TOKEN }}
          title: "JaCoCo coverage"
          min-coverage-overall: 0
          min-coverage-changed-files: 0
          update-comment: true
