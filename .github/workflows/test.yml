name: Test

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions: read-all

concurrency:
  group: test-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    runs-on: ubuntu-latest
    # Quarkus Dev Services (Testcontainers) start Redis Stack + WireMock voor integratietests.
    # Geen `services:` block nodig — alle tests draaien in de `test` Maven-phase
    # (JaCoCo coverage-check incluis), dus `mvnw test` op root volstaat.
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - uses: actions/setup-java@be666c2fcd27ec809703dec50e508c2fdc7f6654 # v5.2.0
        with:
          distribution: temurin
          java-version: 21
          cache: maven
      - name: Test
        run: ./mvnw -B test
      - name: Upload JaCoCo report
        if: always()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: jacoco-report
          path: |
            services/berichtenmagazijn/target/site/
            services/berichtenmagazijn/target/jacoco-report/
            services/berichtenmagazijn/target/jacoco-quarkus.exec
