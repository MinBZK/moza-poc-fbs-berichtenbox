name: detekt

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions: read-all

concurrency:
  group: detekt-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # Bepaalt of er iets buiten documentatie (docs/, *.md) is gewijzigd. De detekt-gate is
  # hieraan gegate, maar de workflow blijft triggeren zodat de required status check
  # `detekt-gate` ook bij een docs-only PR gerapporteerd wordt: een via `if` overgeslagen
  # job telt als 'skipped' = succes voor branch protection.
  changes:
    runs-on: ubuntu-latest
    outputs:
      run: ${{ steps.filter.outputs.run }}
    steps:
      - name: Detecteer niet-documentatie wijzigingen
        id: filter
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          EVENT: ${{ github.event_name }}
          REPO: ${{ github.repository }}
          PR: ${{ github.event.pull_request.number }}
        run: |
          if [ "$EVENT" != "pull_request" ]; then
            echo "run=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          files=$(gh api --paginate "repos/$REPO/pulls/$PR/files" --jq '.[].filename')
          echo "Gewijzigde bestanden:"
          printf '%s\n' "$files"
          if printf '%s\n' "$files" | grep -qvE '(^docs/|\.md$)'; then
            echo "run=true" >> "$GITHUB_OUTPUT"
          else
            echo "Alleen documentatie gewijzigd — code-checks overgeslagen."
            echo "run=false" >> "$GITHUB_OUTPUT"
          fi

  detekt:
    needs: changes
    if: needs.changes.outputs.run == 'true'
    # Naam onderscheidt deze build-gate van de gelijknamige code-scanning-check die
    # GitHub Advanced Security post (SARIF tool.name "detekt"). Required status check.
    name: detekt-gate
    runs-on: ubuntu-latest
    permissions:
      contents: read
      security-events: write
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - uses: actions/setup-java@be666c2fcd27ec809703dec50e508c2fdc7f6654 # v5.2.0
        with:
          distribution: temurin
          java-version: 21
          cache: maven
      # detekt analyseert bronnen (geen compile/tests nodig); de complexity-gate
      # (detekt.yml maxIssues) laat de stap falen bij nieuwe complexiteit boven budget.
      - name: Run detekt
        run: ./mvnw -B detekt:check
      # SARIF ook uploaden als detekt faalt (bv. budget-overschrijding), zodat bevindingen
      # zichtbaar blijven in het code-scanning-dashboard. Per module een aparte upload met
      # eigen `category`: code scanning weigert sinds 2025 meerdere SARIF-runs onder dezelfde
      # category. De hashFiles-guard slaat upload over als een module geen rapport opleverde.
      - name: Upload SARIF — fbs-common
        if: ${{ always() && hashFiles('libraries/fbs-common/target/detekt.sarif') != '' }}
        uses: github/codeql-action/upload-sarif@7211b7c8077ea37d8641b6271f6a365a22a5fbfa # v4.36.0
        with:
          sarif_file: libraries/fbs-common/target/detekt.sarif
          category: detekt-fbs-common
      - name: Upload SARIF — fbs-berichtensessiecache
        if: ${{ always() && hashFiles('libraries/fbs-berichtensessiecache/target/detekt.sarif') != '' }}
        uses: github/codeql-action/upload-sarif@7211b7c8077ea37d8641b6271f6a365a22a5fbfa # v4.36.0
        with:
          sarif_file: libraries/fbs-berichtensessiecache/target/detekt.sarif
          category: detekt-fbs-berichtensessiecache
      - name: Upload SARIF — berichtenmagazijn
        if: ${{ always() && hashFiles('services/berichtenmagazijn/target/detekt.sarif') != '' }}
        uses: github/codeql-action/upload-sarif@7211b7c8077ea37d8641b6271f6a365a22a5fbfa # v4.36.0
        with:
          sarif_file: services/berichtenmagazijn/target/detekt.sarif
          category: detekt-berichtenmagazijn
      - name: Upload SARIF — berichtenuitvraag
        if: ${{ always() && hashFiles('services/berichtenuitvraag/target/detekt.sarif') != '' }}
        uses: github/codeql-action/upload-sarif@7211b7c8077ea37d8641b6271f6a365a22a5fbfa # v4.36.0
        with:
          sarif_file: services/berichtenuitvraag/target/detekt.sarif
          category: detekt-berichtenuitvraag
