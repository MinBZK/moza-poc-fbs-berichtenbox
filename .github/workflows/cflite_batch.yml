name: ClusterFuzzLite batch fuzzing
on:
  schedule:
    - cron: '0 1 * * 6' # Zaterdag 01:00 UTC

permissions: read-all

jobs:
  Batch:
    runs-on: ubuntu-latest
    steps:
      - name: Build Fuzzers
        id: build
        uses: google/clusterfuzzlite/actions/build_fuzzers@884713d53f1a1d4672b8a5ff48c2baf0580e690c # v1
        with:
          language: jvm
      - name: Run Fuzzers
        id: run
        uses: google/clusterfuzzlite/actions/run_fuzzers@884713d53f1a1d4672b8a5ff48c2baf0580e690c # v1
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          fuzz-seconds: 3600
          mode: batch
