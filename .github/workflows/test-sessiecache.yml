name: Test Berichtensessiecache

on:
  workflow_dispatch:

permissions: read-all

jobs:
  test:
    runs-on: ubuntu-latest
    services:
      redis:
        image: redis/redis-stack-server:7.4.0-v3
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 5s
          --health-timeout 3s
          --health-retries 5
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21
          cache: maven
      - name: Compile
        run: ./mvnw compile -pl services/berichtensessiecache -am -B -q
      - name: Test
        run: ./mvnw test -pl services/berichtensessiecache -B
