name: Test Berichtensessiecache

on:
  push:
    branches: ['issue-1/**']
  workflow_dispatch:

permissions: read-all

jobs:
  test:
    runs-on: ubuntu-latest
    services:
      redis:
        image: redis/redis-stack-server:7.4.0-v3
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 5s
          --health-timeout 3s
          --health-retries 5
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - uses: actions/setup-java@c5195efecf7bdfc987ee8bae7a71cb8b11521c00 # v4.7.1
        with:
          distribution: temurin
          java-version: 21
          cache: maven
      - name: Compile
        run: ./mvnw compile -pl services/berichtensessiecache -am -B -q
      - name: Test
        run: ./mvnw test -pl services/berichtensessiecache -B
