name: Test Berichtensessiecache

on:
  push:
    branches: ['issue-1/**']
  pull_request:
    branches: [main]
    paths:
      - 'services/berichtensessiecache/**'
      - 'pom.xml'
  workflow_dispatch:

permissions: read-all

jobs:
  test:
    runs-on: ubuntu-latest
    # Geen `services: redis` meer: Quarkus Dev Services (Testcontainers) start een Redis Stack
    # container vanuit `RealRedisTestProfile`. Unit- en mock-tests gebruiken geen Redis.
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21
          cache: maven
      - name: Test
        run: ./mvnw verify -pl services/berichtensessiecache -am -B
