# Testconfiguratie van de library: er is geen main-application.properties (config
# komt in productie van de consumerende service), dus alles wat de beans bij
# @QuarkusTest-bootstrap nodig hebben staat hier.

# JaCoCo: fbs-common-dependency uitsluiten zodat de BUNDLE-rule alleen
# library-eigen code meet (fbs-common heeft eigen coverage); interface-klassen
# met alleen $default-bridges hebben geen eigen logica.
quarkus.jacoco.excludes=nl/rijksoverheid/moz/fbs/common/**,**/*$$DefaultImpls.class,nl/rijksoverheid/moz/fbs/berichtensessiecache/berichten/BerichtenCache.class,nl/rijksoverheid/moz/fbs/berichtensessiecache/Sessiecache.class

# Redis-configuratie per TestProfile:
# - MockedDependenciesProfile / WireMockTestProfile: devservices=false, dummy host
# - RealRedisTestProfile: devservices=true (Testcontainers start Redis Stack)

# Logboek Dataverwerkingen uitgeschakeld in tests; de wrapper-config verwacht
# wel aanwezige waarden.
logboekdataverwerking.enabled=false
logboekdataverwerking.service-name=fbs-berichtensessiecache-test
logboekdataverwerking.clickhouse.endpoint=http://localhost:8123
logboekdataverwerking.clickhouse.username=ldv
logboekdataverwerking.clickhouse.password=ldv
logboekdataverwerking.clickhouse.database=ldv_logging
logboekdataverwerking.clickhouse.table=logboek_dataverwerkingen

# Quarkus bean discovery voor logboekdataverwerking-wrapper (fbs-common verwijst
# naar wrapper-klassen; zonder index worden de CDI-beans niet gevonden).
quarkus.index-dependency.ldv.group-id=nl.mijnoverheidzakelijk.ldv
quarkus.index-dependency.ldv.artifact-id=logboekdataverwerking-wrapper

# Magazijn-instances: test-defaults, matcht WireMockMagazijnResource.
magazijnen.instances.magazijn-a.url=http://localhost:8081
magazijnen.instances.magazijn-b.url=http://localhost:8082
magazijnen.instances.magazijn-a.afzenders=00000001003214345000
magazijnen.instances.magazijn-b.afzenders=00000001823288444000

# Defensieve grenzen (BerichtLimieten heeft geen defaults; verplicht bij bootstrap).
berichtensessiecache.bericht.max-bijlagen=100
berichtensessiecache.bericht.max-bijlage-naam-lengte=255

# Profiel-service-URL voor tests: dynamische WireMockProfielServiceResource
# overschrijft deze waarde per testklasse.
quarkus.rest-client.profiel-service.url=http://localhost:8089

# Deterministische retry-timing in tests (geen jitter-flakiness).
nl.rijksoverheid.moz.fbs.common.profiel.ProfielServiceClient/getPartij/Retry/jitter=0

# Resolver-cache effectief uit (expireAfterWrite(0) levert nooit een hit);
# cache-gedrag wordt in een dedicated @TestProfile getest.
profiel.resolver.cache.ttl-seconds=0
