description:
  nl:
    localisedName: MOZa Berichtenbox
    shortDescription: >-
      PoC Berichtenbox voor MijnOverheid Zakelijk (MOZa).
    longDescription: >
      De MOZa Berichtenbox is een Proof of Concept voor het ontvangen,
      opslaan en ophalen van berichten binnen MijnOverheid Zakelijk. De
      Berichtenbox is onderdeel van het Federatief Berichtenstelsel (FBS)
      en bestaat uit de volgende onderdelen:

      - Berichtensessiecache

      - Berichtenmagazijn

      - Berichtnotificatieprofiel


      Deze repository bevat de broncode van de PoC Berichtenbox. Het
      MOZa-project bestaat uit meerdere repositories binnen de MinBZK
      organisatie, te herkennen aan de moza- prefix of het topic
      mijnoverheidzakelijk.
    features:
      - Ontvangen en opslaan van berichten
      - Ophalen en weergeven van berichtensessiecache
      - Beheer van berichtnotificatieprofielen
  en:
    shortDescription: >-
      PoC Berichtenbox for "MijnOverheid Zakelijk" (MOZa).
    longDescription: >
      The MOZa Berichtenbox is a Proof of Concept for receiving, storing
      and retrieving messages within "MijnOverheid Zakelijk". The
      Berichtenbox is part of the Federatief Berichtenstelsel (FBS,
      Federated Messaging System) and consists of the following
      components:

      - Message list

      - Message store

      - Message notification profile


      This repository contains the source code of the PoC Berichtenbox.
      The MOZa project consists of multiple repositories within the
      MinBZK organisation, identifiable by the moza- prefix or the
      mijnoverheidzakelijk topic.
    features:
      - Receiving and storing messages
      - Retrieving and displaying message lists
      - Management of message notification profiles
