services:
  redis:
    image: redis/redis-stack-server:7.4.0-v3
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  magazijn-a:
    image: wiremock/wiremock:3.13.2
    ports:
      - "8081:8080"
    volumes:
      - ./wiremock/magazijn-a/mappings:/home/wiremock/mappings
      - ./wiremock/magazijn-a/__files:/home/wiremock/__files
    command: ["--verbose", "--global-response-templating"]

  magazijn-b:
    image: wiremock/wiremock:3.13.2
    ports:
      - "8082:8080"
    volumes:
      - ./wiremock/magazijn-b/mappings:/home/wiremock/mappings
      - ./wiremock/magazijn-b/__files:/home/wiremock/__files
    command: ["--verbose", "--global-response-templating"]

  # MOZA Profiel Service stub voor berichtenmagazijn — simuleert het ophalen van
  # een partij (BSN/KVK/RSIN) inclusief OntvangViaBerichtenbox-voorkeur en scope
  # naar een afzender-OIN. Default mapping geeft een actieve voorkeur voor het
  # test-OIN 00000001003214345000; voor 403-rookproef is er een mapping op BSN
  # 111222333 die een partij zonder voorkeuren teruggeeft.
  profiel-service:
    image: wiremock/wiremock:3.13.2
    ports:
      - "8089:8080"
    volumes:
      # Gedeelde mappings met de ZAD externe-stubs-image (profiel + notificatie). WireMock
      # laadt álle mappings in deze map, dus ook notificatie-events.json (POST /events); lokaal
      # roept de profielclient die alleen niet aan (de notificatie-stub draait apart op 8084).
      - ./wiremock/externe-stubs/mappings:/home/wiremock/mappings
    command: ["--verbose"]

  # Aanmeld- en Notificatie-stubs voor de Publicatie Stream. Ontvangen CloudEvents
  # `nl.rijksoverheid.fbs.bericht.gepubliceerd` op POST /events. Draaien standaard
  # mee: de outbox-poller heeft deze downstreams nodig om claims af te leveren, dus
  # `docker compose up -d` test lokaal de volledige keten. Zonder deze stubs blijft
  # de poller claims herproberen en stapelen de WARN/ERROR-logs zich op.
  # Tests gebruiken een embedded JDK HttpServer en hebben deze containers niet nodig.
  aanmeld-stub:
    image: wiremock/wiremock:3.13.2
    ports:
      - "8083:8080"
    volumes:
      - ./wiremock/aanmeld-stub/mappings:/home/wiremock/mappings
    command: ["--verbose", "--global-response-templating"]

  notificatie-stub:
    image: wiremock/wiremock:3.13.2
    ports:
      - "8084:8080"
    volumes:
      - ./wiremock/notificatie-stub/mappings:/home/wiremock/mappings
    command: ["--verbose", "--global-response-templating"]

  clickhouse:
    image: clickhouse/clickhouse-server:26.6
    ports:
      - "8123:8123"
    environment:
      CLICKHOUSE_USER: ldv
      CLICKHOUSE_PASSWORD: ldv
      CLICKHOUSE_DB: ldv_logging

  postgres-a:
    image: postgres:18
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: berichtenmagazijn
      POSTGRES_PASSWORD: berichtenmagazijn
      POSTGRES_DB: berichtenmagazijn
    # Postgres 18+ verwacht een mount op /var/lib/postgresql (zonder /data); de
    # data komt in een major-version-subdirectory (`/var/lib/postgresql/18/docker`).
    # Zo blijft `pg_upgrade --link` mogelijk bij toekomstige major upgrades.
    # Zie https://github.com/docker-library/postgres/pull/1259.
    volumes:
      - postgres-data-a:/var/lib/postgresql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U berichtenmagazijn -d berichtenmagazijn"]
      interval: 5s
      timeout: 3s
      retries: 5

  postgres-b:
    image: postgres:18
    ports:
      - "5433:5432"
    environment:
      POSTGRES_USER: berichtenmagazijn
      POSTGRES_PASSWORD: berichtenmagazijn
      POSTGRES_DB: berichtenmagazijn
    volumes:
      - postgres-data-b:/var/lib/postgresql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U berichtenmagazijn -d berichtenmagazijn"]
      interval: 5s
      timeout: 3s
      retries: 5

  # Demo-stack: alleen actief met `--profile demo`. Zonder profiel start compose de infra
  # en draai je de services met `quarkus:dev` (hot reload behouden; in een container kost
  # elke codewijziging een image-build). QUARKUS_PROFILE=dev is bewust: OutboundTlsValidator
  # staat plaintext http alleen toe in dev en test, en de stubs spreken geen https.
  #
  # Images bouwen met jib (geen Dockerfile):
  #   ./mvnw clean package -DskipTests \
  #     -pl services/berichtenmagazijn,services/berichtenuitvraag -am \
  #     -Dquarkus.container-image.build=true \
  #     -Dquarkus.container-image.group=fbs-demo -Dquarkus.container-image.tag=demo
  #
  # QUARKUS_HTTP_HOST staat expliciet op 0.0.0.0: in NORMAL launch mode is dat al de
  # default, maar Quarkus bindt in dev *mode* op localhost. Bij de combinatie "profiel
  # dev, launch mode normal" sluit dit die twijfel uit — bindt de service op localhost,
  # dan is de gepubliceerde poort dood.
  berichtenmagazijn-a:
    image: fbs-demo/fbs-berichtenmagazijn:demo
    profiles: [demo]
    ports:
      - "8090:8090"
    depends_on:
      postgres-a:
        condition: service_healthy
    environment:
      QUARKUS_PROFILE: dev
      QUARKUS_HTTP_HOST: 0.0.0.0
      DB_JDBC_URL: jdbc:postgresql://postgres-a:5432/berichtenmagazijn
      MAGAZIJN_OIN: "00000001003214345000"
      AANMELD_URL: http://aanmeld-stub:8080/events
      NOTIFICATIE_URL: http://notificatie-stub:8080/events
      PROFIEL_SERVICE_URL: http://profiel-service:8080
      LDV_CLICKHOUSE_ENDPOINT: http://clickhouse:8123

  # Beide magazijn-containers luisteren intern op 8090; alleen de gepubliceerde poort
  # verschilt. MAGAZIJN_B_URL wijst daarom naar berichtenmagazijn-b:8090, niet naar 8091.
  berichtenmagazijn-b:
    image: fbs-demo/fbs-berichtenmagazijn:demo
    profiles: [demo]
    ports:
      - "8091:8090"
    depends_on:
      postgres-b:
        condition: service_healthy
    environment:
      QUARKUS_PROFILE: dev
      QUARKUS_HTTP_HOST: 0.0.0.0
      DB_JDBC_URL: jdbc:postgresql://postgres-b:5432/berichtenmagazijn
      MAGAZIJN_OIN: "00000001823288444000"
      AANMELD_URL: http://aanmeld-stub:8080/events
      NOTIFICATIE_URL: http://notificatie-stub:8080/events
      PROFIEL_SERVICE_URL: http://profiel-service:8080
      LDV_CLICKHOUSE_ENDPOINT: http://clickhouse:8123

  berichtenuitvraag:
    image: fbs-demo/fbs-berichtenuitvraag:demo
    profiles: [demo]
    ports:
      - "8086:8086"
    depends_on:
      redis:
        condition: service_healthy
      berichtenmagazijn-a:
        condition: service_started
      berichtenmagazijn-b:
        condition: service_started
    environment:
      QUARKUS_PROFILE: dev
      QUARKUS_HTTP_HOST: 0.0.0.0
      REDIS_HOSTS: redis://redis:6379
      MAGAZIJN_A_URL: http://berichtenmagazijn-a:8090
      MAGAZIJN_B_URL: http://berichtenmagazijn-b:8090
      PROFIEL_SERVICE_URL: http://profiel-service:8080
      LDV_CLICKHOUSE_ENDPOINT: http://clickhouse:8123

volumes:
  postgres-data-a:
  postgres-data-b:
