services:
  redis:
    image: redis/redis-stack-server:7.4.0-v3
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  magazijn-a:
    image: wiremock/wiremock:3.13.2
    ports:
      - "8081:8080"
    volumes:
      - ./wiremock/magazijn-a/mappings:/home/wiremock/mappings
      - ./wiremock/magazijn-a/__files:/home/wiremock/__files
    command: ["--verbose", "--global-response-templating"]

  magazijn-b:
    image: wiremock/wiremock:3.13.2
    ports:
      - "8082:8080"
    volumes:
      - ./wiremock/magazijn-b/mappings:/home/wiremock/mappings
      - ./wiremock/magazijn-b/__files:/home/wiremock/__files
    command: ["--verbose", "--global-response-templating"]

  # MOZA Profiel Service stub voor berichtenmagazijn — simuleert het ophalen van
  # een partij (BSN/KVK/RSIN) inclusief OntvangViaBerichtenbox-voorkeur en scope
  # naar een afzender-OIN. Default mapping geeft een actieve voorkeur voor het
  # test-OIN 00000001003214345000; voor 403-rookproef is er een mapping op BSN
  # 111222333 die een partij zonder voorkeuren teruggeeft.
  profiel-service:
    image: wiremock/wiremock:3.13.2
    ports:
      - "8089:8080"
    volumes:
      # Gedeelde mappings met de ZAD externe-stubs-image (profiel + notificatie). WireMock
      # laadt álle mappings in deze map, dus ook notificatie-events.json (POST /events); lokaal
      # roept de profielclient die alleen niet aan (de notificatie-stub draait apart op 8084).
      - ./wiremock/externe-stubs/mappings:/home/wiremock/mappings
      # Demo-only persona-voorkeuren, als subdir (WireMock laadt recursief). Apart gehouden
      # zodat de elfproef-geldige persona-BSN's níet in het publieke externe-stubs-image komen.
      - ./wiremock/demo-profiel/mappings:/home/wiremock/mappings/demo-profiel
      # Gegenereerde Grootbedrijf-persona-stub (fase 6). WireMock laadt recursief.
      - ./demo/generated/profiel:/home/wiremock/mappings/demo-profiel-generated
    command: ["--verbose"]

  # Aanmeld- en Notificatie-stubs voor de Publicatie Stream. Ontvangen CloudEvents
  # `nl.rijksoverheid.fbs.bericht.gepubliceerd` op POST /events. Draaien standaard
  # mee: de outbox-poller heeft deze downstreams nodig om claims af te leveren, dus
  # `docker compose up -d` test lokaal de volledige keten. Zonder deze stubs blijft
  # de poller claims herproberen en stapelen de WARN/ERROR-logs zich op.
  # Tests gebruiken een embedded JDK HttpServer en hebben deze containers niet nodig.
  aanmeld-stub:
    image: wiremock/wiremock:3.13.2
    ports:
      - "8083:8080"
    volumes:
      - ./wiremock/aanmeld-stub/mappings:/home/wiremock/mappings
    command: ["--verbose", "--global-response-templating"]

  notificatie-stub:
    image: wiremock/wiremock:3.13.2
    ports:
      - "8084:8080"
    volumes:
      - ./wiremock/notificatie-stub/mappings:/home/wiremock/mappings
    command: ["--verbose", "--global-response-templating"]

  clickhouse:
    image: clickhouse/clickhouse-server:26.6
    ports:
      - "8123:8123"
    environment:
      CLICKHOUSE_USER: ldv
      CLICKHOUSE_PASSWORD: ldv
      CLICKHOUSE_DB: ldv_logging

  postgres-a:
    image: postgres:18
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: berichtenmagazijn
      POSTGRES_PASSWORD: berichtenmagazijn
      POSTGRES_DB: berichtenmagazijn
    # Postgres 18+ verwacht een mount op /var/lib/postgresql (zonder /data); de
    # data komt in een major-version-subdirectory (`/var/lib/postgresql/18/docker`).
    # Zo blijft `pg_upgrade --link` mogelijk bij toekomstige major upgrades.
    # Zie https://github.com/docker-library/postgres/pull/1259.
    volumes:
      - postgres-data-a:/var/lib/postgresql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U berichtenmagazijn -d berichtenmagazijn"]
      interval: 5s
      timeout: 3s
      retries: 5

  postgres-b:
    image: postgres:18
    ports:
      - "5433:5432"
    environment:
      POSTGRES_USER: berichtenmagazijn
      POSTGRES_PASSWORD: berichtenmagazijn
      POSTGRES_DB: berichtenmagazijn
    volumes:
      - postgres-data-b:/var/lib/postgresql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U berichtenmagazijn -d berichtenmagazijn"]
      interval: 5s
      timeout: 3s
      retries: 5

  # Demo-stack: alleen actief met `--profile demo`. Zonder profiel start compose de infra
  # en draai je de services met `quarkus:dev` (hot reload behouden; in een container kost
  # elke codewijziging een image-build). QUARKUS_PROFILE=dev is bewust: OutboundTlsValidator
  # staat plaintext http alleen toe in dev en test, en de stubs spreken geen https.
  #
  # Images bouwen met jib (geen Dockerfile):
  #   ./mvnw clean package -DskipTests \
  #     -pl services/berichtenmagazijn,services/berichtenuitvraag -am \
  #     -Dquarkus.container-image.build=true \
  #     -Dquarkus.container-image.group=fbs-demo -Dquarkus.container-image.tag=demo
  #
  # QUARKUS_HTTP_HOST staat expliciet op 0.0.0.0: in NORMAL launch mode is dat al de
  # default, maar Quarkus bindt in dev *mode* op localhost. Bij de combinatie "profiel
  # dev, launch mode normal" sluit dit die twijfel uit — bindt de service op localhost,
  # dan is de gepubliceerde poort dood.
  berichtenmagazijn-a:
    image: fbs-demo/fbs-berichtenmagazijn:demo
    profiles: [demo]
    ports:
      - "8090:8090"
    depends_on:
      postgres-a:
        condition: service_healthy
      toxiproxy:
        condition: service_started
    environment:
      QUARKUS_PROFILE: dev
      QUARKUS_HTTP_HOST: 0.0.0.0
      DB_JDBC_URL: jdbc:postgresql://postgres-a:5432/berichtenmagazijn
      MAGAZIJN_OIN: "00000001003214345000"
      # Downstreams (aanmeld=echte uitvraag-webhook, notificatie) lopen via Toxiproxy zodat fase 5
      # ze per knop kan uitschakelen. Transparant bij normaal bedrijf. De aanmeld-levering laat een
      # nieuw bericht live in de sessiecache belanden (mits actieve sessie), zodat 'Vernieuw' werkt.
      AANMELD_URL: http://toxiproxy:18086/api/v1/aanmeldingen
      NOTIFICATIE_URL: http://toxiproxy:18084/events
      PROFIEL_SERVICE_URL: http://profiel-service:8080
      LDV_CLICKHOUSE_ENDPOINT: http://clickhouse:8123
      # Outbox sneller laten pollen zodat storing→herstel binnen seconden zichtbaar is (default 60s),
      # en meer pogingen zodat een uitgeschakelde downstream niet terminal MISLUKT tijdens de uitleg.
      MAGAZIJN_PUBLICATIE_POLLING_INTERVAL: 5s
      MAGAZIJN_PUBLICATIE_DOWNSTREAMS_AANMELD_MAX_POGINGEN: "50"
      MAGAZIJN_PUBLICATIE_DOWNSTREAMS_NOTIFICATIE_MAX_POGINGEN: "50"

  # Beide magazijn-containers luisteren intern op 8090; alleen de gepubliceerde poort
  # verschilt. MAGAZIJN_B_URL wijst daarom naar berichtenmagazijn-b:8090, niet naar 8091.
  berichtenmagazijn-b:
    image: fbs-demo/fbs-berichtenmagazijn:demo
    profiles: [demo]
    ports:
      - "8091:8090"
    depends_on:
      postgres-b:
        condition: service_healthy
      toxiproxy:
        condition: service_started
    environment:
      QUARKUS_PROFILE: dev
      QUARKUS_HTTP_HOST: 0.0.0.0
      DB_JDBC_URL: jdbc:postgresql://postgres-b:5432/berichtenmagazijn
      MAGAZIJN_OIN: "00000001823288444000"
      # Downstreams via Toxiproxy (zie magazijn-a). Beide magazijnen delen de proxies aanmeld/notificatie.
      AANMELD_URL: http://toxiproxy:18086/api/v1/aanmeldingen
      NOTIFICATIE_URL: http://toxiproxy:18084/events
      PROFIEL_SERVICE_URL: http://profiel-service:8080
      LDV_CLICKHOUSE_ENDPOINT: http://clickhouse:8123
      MAGAZIJN_PUBLICATIE_POLLING_INTERVAL: 5s
      MAGAZIJN_PUBLICATIE_DOWNSTREAMS_AANMELD_MAX_POGINGEN: "50"
      MAGAZIJN_PUBLICATIE_DOWNSTREAMS_NOTIFICATIE_MAX_POGINGEN: "50"

  # Netwerk-storingssimulator tussen de uitvraag en zijn afhankelijkheden. Proxies vast uit
  # /proxies.json; de demo-console voegt runtime toxics toe via de admin-API (:8474).
  toxiproxy:
    image: ghcr.io/shopify/toxiproxy:2.11.0
    profiles: [demo]
    ports:
      - "8474:8474"
    volumes:
      - ./toxiproxy/proxies.json:/proxies.json:ro
    command: ["-host=0.0.0.0", "-config=/proxies.json"]

  # Lichtgewicht stub-magazijnen voor 'veel magazijnen' (fase 6). Eén WireMock, n pad-gebaseerde
  # magazijnen (/mNN) uit demo/generated/ — draai eerst demo/genereer-magazijnen.py. De demo-console
  # zet stubs live op storing via de admin-API (:8092/__admin/mappings).
  magazijn-stubs:
    image: wiremock/wiremock:3.13.2
    profiles: [demo]
    ports:
      - "8092:8080"
    volumes:
      - ./demo/generated/magazijn-stubs-mappings:/home/wiremock/mappings
    command: ["--verbose"]
    # Eén container, n hostnamen: de uitvraag-rest-client laat het base-URL-pad (/mNN) vallen, dus
    # per-stub-routering gaat via de Host-header. Elke alias mNN wijst naar deze container; WireMock
    # matcht op Host. Begrenst het ingerichte aantal op 50 (zie MAX_STUBS in genereer-magazijnen.py).
    networks:
      default:
        aliases: [m01, m02, m03, m04, m05, m06, m07, m08, m09, m10, m11, m12, m13, m14, m15, m16, m17, m18, m19, m20, m21, m22, m23, m24, m25, m26, m27, m28, m29, m30, m31, m32, m33, m34, m35, m36, m37, m38, m39, m40, m41, m42, m43, m44, m45, m46, m47, m48, m49, m50]

  berichtenuitvraag:
    image: fbs-demo/fbs-berichtenuitvraag:demo
    profiles: [demo]
    ports:
      - "8086:8086"
    depends_on:
      redis:
        condition: service_healthy
      berichtenmagazijn-a:
        condition: service_started
      berichtenmagazijn-b:
        condition: service_started
      toxiproxy:
        condition: service_started
    environment:
      QUARKUS_PROFILE: dev
      QUARKUS_HTTP_HOST: 0.0.0.0
      # Alle uitvraag-afhankelijkheden lopen via Toxiproxy (transparant bij normaal bedrijf).
      REDIS_HOSTS: redis://toxiproxy:16379
      MAGAZIJN_A_URL: http://toxiproxy:18090
      MAGAZIJN_B_URL: http://toxiproxy:18091
      PROFIEL_SERVICE_URL: http://toxiproxy:18089
      LDV_CLICKHOUSE_ENDPOINT: http://clickhouse:8123
      # CORS voor de Berichtenbox-UI (:8095). Runtime-property, dus geen rebuild nodig;
      # origins staan onder %dev in application.properties. Alleen in het demo-profiel.
      QUARKUS_HTTP_CORS_ENABLED: "true"
      # Korte cache-TTL voor de demo (sliding verval na ~2 min inactiviteit). Alleen demo;
      # prod houdt PT12H. De property heeft geen min-validatie.
      BERICHTENSESSIECACHE_TTL: PT2M
      # Extra register-entries voor de stub-magazijnen (fase 6), gegenereerd in demo/generated/.
      # SmallRye leest dit absolute pad als additionele config-bron en merge't het bij de baked A/B.
      SMALLRYE_CONFIG_LOCATIONS: /demo-config/magazijnen-stubs.properties
      # Bulkhead ruim boven het ingerichte aantal stubs (fase 6), zodat bij veel magazijnen niet de
      # helft als OVERBELAST wordt geweigerd. Alleen demo; prod houdt de default (20).
      BERICHTENSESSIECACHE_MAGAZIJN_BULKHEAD_MAX_CONCURRENT: "60"
    volumes:
      - ./demo/generated/magazijnen-stubs.properties:/demo-config/magazijnen-stubs.properties:ro

  # Wegwerp-bediening (legen/vullen/random). Aanleveren gaat via de magazijn-HTTP-API;
  # legen gaat via directe JDBC op de magazijn-databases (vandaar de DB-URL's).
  demo-console:
    image: fbs-demo/fbs-demo-console:demo
    profiles: [demo]
    ports:
      - "8095:8095"
    depends_on:
      berichtenmagazijn-a:
        condition: service_started
      berichtenmagazijn-b:
        condition: service_started
      toxiproxy:
        condition: service_started
      redis:
        condition: service_healthy
    environment:
      QUARKUS_PROFILE: dev
      QUARKUS_HTTP_HOST: 0.0.0.0
      TOXIPROXY_ADMIN_URL: http://toxiproxy:8474
      # Direct op Redis (niet via Toxiproxy) voor de cache-verval-knop.
      REDIS_HOSTS: redis://redis:6379
      # Uitvraag-aanmeld-webhook voor de ontdubbeling-knop (fase 5).
      UITVRAAG_URL: http://berichtenuitvraag:8086
      MAGAZIJN_A_URL: http://berichtenmagazijn-a:8090
      MAGAZIJN_B_URL: http://berichtenmagazijn-b:8090
      MAGAZIJN_A_DB_URL: jdbc:postgresql://postgres-a:5432/berichtenmagazijn
      MAGAZIJN_B_DB_URL: jdbc:postgresql://postgres-b:5432/berichtenmagazijn
      MAGAZIJN_STUBS_ADMIN_URL: http://magazijn-stubs:8080
      # Eén bron van waarheid voor n: compose leest het uit je shell (default 12). Gebruik dezelfde
      # export voor het script:  export DEMO_MAGAZIJN_STUBS=40 && python3 demo/genereer-magazijnen.py
      DEMO_MAGAZIJN_STUBS: "${DEMO_MAGAZIJN_STUBS:-12}"

volumes:
  postgres-data-a:
  postgres-data-b:
